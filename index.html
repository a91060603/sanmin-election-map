<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>高雄三民區選舉地圖</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f1117;--panel:#1a1d27;--border:#2a2d3e;
      --accent:#4f7cff;--text:#e8eaf0;--muted:#8892aa;
      --green:#22c55e;--red:#ef4444;
      --dpp:#1B9431;--kmt:#003F8E;--tpp:#28C8C8;
      --npp:#FBBE01;--tsp:#C00000;--gp:#66BB6A;--obs:#E91E8C;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Noto Sans TC',sans-serif;font-size:14px;background:var(--bg);color:var(--text);overflow:hidden;}
    body{display:flex;flex-direction:column;}

    header{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);flex-shrink:0;}
    header h1{font-size:15px;font-weight:700;}
    header .sub{font-size:11px;color:var(--muted);}

    .filter-area{background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
    .filter-row{display:flex;align-items:center;gap:5px;padding:5px 14px;overflow-x:auto;white-space:nowrap;border-bottom:1px solid var(--border);}
    .filter-row:last-child{border-bottom:none;}
    .filter-label{font-size:11px;color:var(--muted);flex-shrink:0;width:30px;}
    .fbtn{padding:4px 11px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans TC',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
    .fbtn:hover:not(:disabled){border-color:var(--accent);color:var(--text);}
    .fbtn:disabled{opacity:0.22;cursor:not-allowed;}
    .fbtn.active{color:#fff;font-weight:500;}
    .fbtn.active.p-dpp{background:var(--dpp);border-color:var(--dpp);}
    .fbtn.active.p-kmt{background:var(--kmt);border-color:var(--kmt);}
    .fbtn.active.p-tpp{background:var(--tpp);border-color:var(--tpp);color:#0f1117;}
    .fbtn.active.p-npp{background:var(--npp);border-color:var(--npp);color:#0f1117;}
    .fbtn.active.p-tsp{background:var(--tsp);border-color:var(--tsp);}
    .fbtn.active.p-gp{background:var(--gp);border-color:var(--gp);color:#0f1117;}
    .fbtn.active.p-obs{background:var(--obs);border-color:var(--obs);}
    .fbtn.active.p-pop,.fbtn.active.p-all,.fbtn.active.y-btn,.fbtn.active.t-btn{background:var(--accent);border-color:var(--accent);}

    .main{display:flex;flex:1;overflow:hidden;min-height:0;}
    #map{flex:1;background:#151820;min-width:0;position:relative;}

    #legend-overlay{
      position:absolute;bottom:36px;right:10px;z-index:900;
      background:rgba(15,17,23,0.93);border:1px solid var(--border);
      border-radius:6px;padding:10px 12px;min-width:150px;max-width:180px;
      backdrop-filter:blur(4px);pointer-events:none;
    }
    .legend-title{font-size:12px;color:var(--accent);font-weight:500;margin-bottom:6px;}
    .legend-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;color:var(--muted);}
    .legend-swatch{width:14px;height:9px;border-radius:2px;flex-shrink:0;}

    .sidebar{
      width:38%;max-width:480px;min-width:270px;
      background:var(--panel);border-left:1px solid var(--border);
      display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
    }
    .sidebar-inner{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;}
    .sidebar-section{padding:13px 15px;border-bottom:1px solid var(--border);}
    .sidebar-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}

    .back-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:10px;padding:4px 0;border:none;background:none;transition:color 0.15s;}
    .back-btn:hover{color:var(--accent);}

    .info-placeholder{font-size:13px;color:var(--muted);line-height:1.8;}
    .info-village{font-size:20px;font-weight:700;color:var(--text);}
    .info-area{font-size:12px;color:var(--muted);margin-bottom:6px;}
    .info-section-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin:10px 0 5px;padding-top:8px;border-top:1px solid var(--border);}

    .stat-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border);}
    .stat-row:last-child{border-bottom:none;}
    .stat-label{font-size:12px;color:var(--muted);flex:1;padding-top:1px;}
    .stat-val-block{text-align:right;}
    .stat-value{font-size:13px;font-weight:600;color:var(--text);}
    .stat-sub{font-size:10px;color:var(--muted);display:block;margin-top:1px;}
    .rank-badge{font-size:11px;color:var(--muted);font-weight:400;margin-left:3px;}
    .hl{color:var(--accent);}.pos{color:var(--green);}.neg{color:var(--red);}

    .party-bar-wrap{margin-top:5px;}
    .party-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
    .pname{font-size:12px;width:56px;flex-shrink:0;}
    .pbar-bg{flex:1;height:9px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
    .pbar-fill{height:100%;border-radius:2px;transition:width 0.3s;}
    .pstats{font-size:11px;color:var(--muted);width:100px;text-align:right;flex-shrink:0;}

    .top-section{margin-bottom:12px;}
    .top-section:last-child{margin-bottom:0;}
    .top-section-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--border);}
    .top-item{display:flex;align-items:baseline;gap:6px;padding:3px 0;font-size:12px;}
    .top-item-interactive{cursor:pointer;border-radius:4px;padding:4px 6px;margin:0 -6px;transition:background 0.15s;}
    .top-item-interactive:hover{background:rgba(79,124,255,0.12);}
    .top-item-interactive .top-village{color:var(--text);}
    .top-rank{font-size:11px;color:var(--accent);font-weight:700;width:18px;flex-shrink:0;}
    .top-village{flex:1;color:var(--text);}
    .top-val{font-size:11px;color:var(--muted);text-align:right;}

    .ai-summary{font-size:13px;line-height:1.8;color:var(--text);padding:4px 0 8px;}
    .ai-loading{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;padding:4px 0 8px;}
    .ai-spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .stat-sm{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border);}
    .stat-sm:last-child{border-bottom:none;}
    .stat-sm .lbl{color:var(--muted);}

    .ai-chat-area{border-top:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;max-height:210px;}
    .ai-chat-header{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;flex-shrink:0;user-select:none;}
    .ai-chat-header span{font-size:12px;color:var(--muted);}
    .ai-chat-toggle{font-size:12px;color:var(--muted);}
    .ai-chat-msgs{flex:1;overflow-y:auto;padding:6px 12px;display:flex;flex-direction:column;gap:5px;min-height:0;}
    .msg{font-size:12px;line-height:1.6;padding:6px 10px;border-radius:6px;max-width:92%;word-break:break-all;}
    .msg.user{background:var(--accent);color:#fff;align-self:flex-end;}
    .msg.assistant{background:#22253a;color:var(--text);align-self:flex-start;}
    .ai-chat-input-row{display:flex;gap:6px;padding:7px 12px;flex-shrink:0;border-top:1px solid var(--border);}
    .ai-input{flex:1;background:#22253a;border:1px solid var(--border);border-radius:4px;padding:5px 9px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;}
    .ai-input:focus{border-color:var(--accent);}
    .ai-send{padding:5px 11px;background:var(--accent);border:none;border-radius:4px;color:#fff;font-size:12px;cursor:pointer;flex-shrink:0;}
    .ai-send:disabled{opacity:0.4;cursor:not-allowed;}

    .locate-btn{position:absolute;bottom:36px;left:10px;z-index:1000;width:32px;height:40px;background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));}
    .locate-btn:hover{filter:drop-shadow(0 2px 6px rgba(79,124,255,0.7));}

    .leaflet-container{background:#151820;}
    .leaflet-control-zoom a{background:var(--panel)!important;color:var(--text)!important;border-color:var(--border)!important;}
    .leaflet-control-attribution{background:rgba(15,17,23,0.85)!important;color:var(--muted)!important;font-size:9px!important;}
    .village-label{
      background:transparent!important;border:none!important;box-shadow:none!important;
      font-family:'Noto Sans TC',sans-serif;color:#fff;pointer-events:none;
      text-align:center;line-height:1.45;white-space:nowrap;
      text-shadow:-1px -1px 2px rgba(0,0,0,0.95),1px -1px 2px rgba(0,0,0,0.95),
                  -1px 1px 2px rgba(0,0,0,0.95),1px 1px 2px rgba(0,0,0,0.95);
    }
    .village-label::before{display:none!important;}


    /* ── Analysis Panel ── */
    .atab-bar{display:flex;gap:5px;margin-bottom:11px;flex-wrap:wrap;}
    .atab{flex:1;min-width:0;padding:5px 3px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:5px;font-size:11px;color:var(--muted);cursor:pointer;text-align:center;transition:all 0.15s;white-space:nowrap;}
    .atab.active{background:rgba(255,229,0,0.18);border-color:rgba(255,229,0,0.5);color:#ffe500;}
    .analysis-intro{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:10px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:6px;border-left:3px solid rgba(255,229,0,0.4);}
    .oppo-item,.flow-item{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;cursor:pointer;border-radius:4px;transition:background 0.12s;}
    .oppo-item:hover,.flow-item:hover{background:rgba(79,124,255,0.1);margin:0 -5px;padding:5px 5px;}
    .oppo-rank{font-size:10px;color:var(--accent);font-weight:700;width:16px;flex-shrink:0;}
    .oppo-village{flex:1;color:var(--text);}
    .oppo-val{font-size:11px;font-weight:600;}
    .flow-bar-outer{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
    .flow-bar{height:100%;border-radius:3px;transition:width 0.3s;}
    .flow-val{font-size:11px;font-weight:600;width:42px;text-align:right;flex-shrink:0;}
    .priority-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .priority-count{font-size:11px;color:var(--accent);}
    .priority-clear{font-size:11px;color:var(--muted);cursor:pointer;padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:none;}
    .priority-clear:hover{border-color:var(--red);color:var(--red);}
    .priority-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
    .priority-check{width:14px;height:14px;accent-color:#ffe500;cursor:pointer;flex-shrink:0;}
    .priority-vname{flex:1;cursor:pointer;color:var(--text);}
    .priority-vname:hover{color:var(--accent);}
    .priority-sub{font-size:10px;color:var(--muted);text-align:right;}
    .priority-dot{display:inline-block;width:8px;height:8px;background:#ffe500;border-radius:50%;margin-right:4px;box-shadow:0 0 6px rgba(255,229,0,.7);}
    .calc-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);}
    .calc-label{font-size:12px;color:var(--muted);}
    .calc-value{font-size:14px;font-weight:700;color:var(--text);}
    .calc-input-wrap{display:flex;align-items:center;gap:6px;}
    .calc-input{background:rgba(255,255,255,0.08);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:14px;font-weight:700;width:72px;text-align:right;padding:3px 6px;}
    .calc-slider{width:100%;accent-color:#ffe500;margin:5px 0;}
    .calc-strategy{background:rgba(255,255,255,0.03);border-radius:6px;padding:9px 10px;margin-top:8px;}
    .calc-strategy-title{font-size:11px;color:#ffe500;margin-bottom:6px;font-weight:700;}
    .calc-strategy-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:var(--muted);}
    .calc-strategy-row span:last-child{color:var(--text);font-weight:600;}
    .section-subtitle{font-size:11px;font-weight:700;color:var(--text);margin:10px 0 5px;padding-bottom:4px;border-bottom:1px solid var(--border);}
    @media(max-width:640px){
      .main{flex-direction:column;}
      #map{flex:none;height:52vh;width:100%;}
      .sidebar{width:100%;max-width:none;min-width:0;height:48vh;border-left:none;border-top:1px solid var(--border);flex-direction:row;overflow-x:auto;}
      .sidebar-inner{display:flex;flex-direction:row;height:calc(100% - 80px);width:max-content;}
      .sidebar-section{min-width:220px;max-width:300px;border-bottom:none;border-right:1px solid var(--border);flex-shrink:0;overflow-y:auto;height:100%;}
      .ai-chat-area{min-width:220px;border-top:none;border-right:1px solid var(--border);}
      .locate-btn{bottom:49vh;}
      #legend-overlay{bottom:auto;top:8px;right:8px;}
    }
  </style>
</head>
<body>
<header>
  <div class="dot"></div>
  <div><div class="sub">高雄市</div><h1>三民區選舉地圖</h1></div>
</header>
<div class="filter-area">
  <div class="filter-row" id="row-year">
    <span class="filter-label">年分</span>
    <button class="fbtn y-btn" data-year="2024" onclick="setYear('2024',this)">2024</button>
    <button class="fbtn y-btn" data-year="2022" onclick="setYear('2022',this)">2022</button>
    <button class="fbtn y-btn" disabled>2020</button>
    <button class="fbtn y-btn" disabled>2018</button>
  </div>
  <div class="filter-row" id="row-party">
    <span class="filter-label">政黨</span>
    <button class="fbtn p-all" data-party="all" onclick="setParty('all',this)">全區綜覽</button>
    <button class="fbtn p-dpp" data-party="dpp" onclick="setParty('dpp',this)">民進黨</button>
    <button class="fbtn p-kmt" data-party="kmt" onclick="setParty('kmt',this)">國民黨</button>
    <button class="fbtn p-tpp" data-party="tpp" onclick="setParty('tpp',this)">民眾黨</button>
    <button class="fbtn p-npp" data-party="npp" onclick="setParty('npp',this)">時代力量</button>
    <button class="fbtn p-tsp" data-party="tsp" onclick="setParty('tsp',this)">台灣基進</button>
    <button class="fbtn p-gp"  data-party="gp"  onclick="setParty('gp',this)">綠黨</button>
    <button class="fbtn p-obs" data-party="obs" onclick="setParty('obs',this)">歐巴桑</button>
    <button class="fbtn p-pop" data-party="pop" onclick="setParty('pop',this)">人口資訊</button>
    <button class="fbtn p-ana" data-party="ana" onclick="setParty('ana',this)" style="background:rgba(255,229,0,0.12);border-color:rgba(255,229,0,0.35);color:#ffe500;">🎯 選情分析</button>
  </div>
  <div class="filter-row" id="row-type">
    <span class="filter-label">種類</span>
    <button class="fbtn t-btn" data-type="P" onclick="setType('P',this)">不分區</button>
    <button class="fbtn t-btn" data-type="L" onclick="setType('L',this)">區域立委</button>
    <button class="fbtn t-btn" data-type="C" onclick="setType('C',this)">議員</button>
  </div>
</div>

<div class="main">
  <div id="map">
    <button class="locate-btn" id="locateBtn" onclick="locateUser()" title="定位我的位置">
      <svg width="24" height="36" viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.4 0 0 5.4 0 12c0 8.4 12 24 12 24S24 20.4 24 12C24 5.4 18.6 0 12 0z" fill="#4285F4"/>
        <circle cx="12" cy="12" r="5.5" fill="white"/>
        <circle cx="12" cy="12" r="3.5" fill="#4285F4"/>
      </svg>
    </button>
    <div id="legend-overlay"></div>
  </div>
  <div class="sidebar">
    <div class="sidebar-inner"><div id="main-panel"></div></div>
    <div class="ai-chat-area">
      <div class="ai-chat-header" onclick="toggleChat()">
        <span>💬 詢問地圖資料</span>
        <span class="ai-chat-toggle" id="chat-toggle">▼</span>
      </div>
      <div class="ai-chat-msgs" id="chat-msgs" style="display:none"></div>
      <div class="ai-chat-input-row" id="chat-input-row" style="display:none">
        <input class="ai-input" id="chat-input" placeholder="例：哪個里催票率最高？" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="ai-send" id="chat-send" onclick="sendChat()">送出</button>
      </div>
    </div>
  </div>
</div>

<script>
let RAW, AI_DATA;


const PARTIES={
  dpp:{name:'民進黨', color:'#1B9431',dc:'#4ade80',fieldP:'dpp24_p',fieldL:null,fieldC:null},
  kmt:{name:'國民黨', color:'#003F8E',dc:'#60a5fa',fieldP:'kmt24_p',fieldL:null,fieldC:null},
  tpp:{name:'民眾黨', color:'#28C8C8',dc:'#28C8C8',fieldP:'tpp24_p',fieldL:null,fieldC:null},
  npp:{name:'時代力量',color:'#FBBE01',dc:'#FBBE01',fieldP:'npp24_p',fieldL:null,fieldC:null},
  tsp:{name:'台灣基進',color:'#C00000',dc:'#f87171',fieldP:'tsp24_P',fieldL:null,fieldC:'tsp22'},
  gp: {name:'綠黨',  color:'#66BB6A',dc:'#86efac',fieldP:'gp24_p', fieldL:null,fieldC:null},
  obs:{name:'歐巴桑',color:'#E91E8C',dc:'#f472b6',fieldP:'obs24_P',fieldL:'obs24_L',fieldC:null},
};

let curParty='tsp',curYear='2022',curType='C';
let curVillageProps=null,curScale=null,geojsonLayer=null;
let chatOpen=false,chatHistory=[],chatLoading=false;

// ── Color utils ──
function lighten(hex,steps){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return Array.from({length:steps},(_,i)=>{
    const t=1-(i/(steps-1));
    return `rgb(${Math.round(r+(255-r)*t*0.88)},${Math.round(g+(255-g)*t*0.88)},${Math.round(b+(255-b)*t*0.88)})`;
  });
}
function getColor(scale,v){
  if(v==null)return '#2a2d3e';
  for(let i=0;i<scale.breaks.length;i++)if(v<scale.breaks[i])return scale.colors[i];
  return scale.colors[scale.colors.length-1];
}

// ── Scale builder ──
function buildScale(party,year,type){
  if(!party||party==='all'||party==='pop')return null;
  const p=PARTIES[party];
  let vField,rField,vRkField,rRkField,tField,tRkField,label;
  if(year==='2024'&&type==='P'){
    // 2024不分區：只有票數，無真實得票率資料
    vField=p.fieldP; rField=null; rRkField=null;
    vRkField=`${party}24p_rank`;
    tField=null; tRkField=null;
    label=`${p.name} 2024 不分區`;
  }else if(year==='2024'&&type==='L'){
    if(!p.fieldL)return null;
    vField=p.fieldL; rField=null; rRkField=null;
    vRkField='obs24L_rank';
    tField=null; tRkField=null;
    label=`${p.name} 2024 區域立委`;
  }else if(year==='2022'&&type==='C'){
    if(!p.fieldC)return null;
    vField=p.fieldC; rField='tsp22_v%'; rRkField='tsp22_v%rk';
    vRkField='tsp22_rk';
    tField='tsp22_t%'; tRkField='tsp22_t%rk';
    label=`${p.name} 2022 議員`;
  }else return null;

  // 地圖著色欄位：2022議員用催票率，2024用票數
  const displayField = (year==='2022'&&type==='C') ? 'tsp22_t%' : vField;

  const vals=RAW.features.map(f=>f.properties[displayField]||0).sort((a,b)=>a-b);
  const n=vals.length;
  const q=[vals[0],vals[Math.floor(n*.2)],vals[Math.floor(n*.4)],vals[Math.floor(n*.6)],vals[Math.floor(n*.8)],vals[n-1]];
  // 2022用百分比格式，2024用票數格式
  const isRate=(year==='2022'&&type==='C');
  const fmt=isRate ? v=>(v*100).toFixed(1)+'%' : v=>v.toLocaleString()+'票';

  // map colors: light→dark (low→high)
  const colorsFwd=lighten(p.color,6);
  // legend: high on top (reverse)
  const colorsRev=[...colorsFwd].reverse();
  const labelsRev=[
    `> ${fmt(q[4])}`,
    `${fmt(q[3])}–${fmt(q[4])}`,
    `${fmt(q[2])}–${fmt(q[3])}`,
    `${fmt(q[1])}–${fmt(q[2])}`,
    `${fmt(q[0])}–${fmt(q[1])}`,
    `< ${fmt(q[1])}`,
  ];

  return{label,isParty:true,partyKey:party,vField,rField,tField,
    vRkField,rRkField,tRkField,displayField,
    breaks:q.slice(1,5),colors:colorsFwd,
    legendColors:colorsRev,legendLabels:labelsRev,
    fmt,party:p,year,type};
}

// ── Zoom-based tooltip ──
const Z_LABEL=12, Z_STATS=15;
function tooltipHTML(props){
  const z=map.getZoom();
  if(z<Z_LABEL)return '';
  const nfs=Math.max(10,Math.min(15,8+(z-10)));
  const sfs=Math.max(9,Math.min(12,7+(z-10)));
  const showStats=z>=Z_STATS;
  const sc=curScale;
  let lines='';
  if(showStats&&sc){
    if(sc.isPop){
      const d=props._pop_diff||0;
      const c=d>0?'#22c55e':d<0?'#ef4444':'#aaa';
      lines+=`<span style="display:block;font-size:${sfs}px;color:${c}">${(d>0?'+':'')+d.toLocaleString()}人</span>`;
    }else if(sc.isParty){
      // 得票數（有資料才顯示）
      if(sc.vField&&props[sc.vField]!=null){
        const v=props[sc.vField]||0;
        const vRk=props[sc.vRkField]||'-';
        lines+=`<span style="display:block;font-size:${sfs}px">得票數 ${v.toLocaleString()}(${vRk})</span>`;
      }
      // 得票率
      if(sc.rField&&props[sc.rField]!=null){
        const rt=((props[sc.rField]||0)*100).toFixed(1);
        const rRk=props[sc.rRkField]||'-';
        lines+=`<span style="display:block;font-size:${sfs}px">得票率 ${rt}%(${rRk})</span>`;
      }
      // 催票率
      if(sc.tField&&props[sc.tField]!=null){
        const tt=((props[sc.tField]||0)*100).toFixed(1);
        const tRk=props[sc.tRkField]||'-';
        lines+=`<span style="display:block;font-size:${sfs}px">催票率 ${tt}%(${tRk})</span>`;
      }
    }
  }
  return `<span style="display:block;font-size:${nfs}px;font-weight:700">${props.village||''}</span>${lines}`;
}
function updateAllTooltips(){
  if(!geojsonLayer)return;
  geojsonLayer.eachLayer(l=>l.setTooltipContent(tooltipHTML(l.feature.properties)));
}
map.on('zoomend',updateAllTooltips);

const villageLayerMap={};

function selectVillage(name){
  if(selectedVillage&&villageLayerMap[selectedVillage]){
    geojsonLayer.resetStyle(villageLayerMap[selectedVillage]);
  }
  selectedVillage=name;
  if(name&&villageLayerMap[name]){

    l.setStyle({weight:4,color:'#ffe500',fillOpacity:0.95,opacity:1});

function highlightVillage(name,on){

    layer.bringToFront();

  }

function buildTop7(sc){
  const fs=RAW.features;
  const pc=sc.party?.dc||'var(--accent)';

  // row7: interactive rows with data-village
  const row7=(arr,vfn,color)=>arr.slice(0,7).map((f,i)=>{
    const vname=f.properties.village;
    return`<div class="top-item top-item-interactive" data-village="${vname}"
      onmouseenter="highlightVillage('${vname}',true)"
      onmouseleave="highlightVillage('${vname}',false)"
      onclick="goToVillage('${vname}')">
      <span class="top-rank">${i+1}</span>
      <span class="top-village">${vname}</span>
      <span class="top-val" style="color:${color}">${vfn(f.properties)}</span>
    </div>`;
  }).join('');

  const byV=[...fs].sort((a,b)=>(b.properties[sc.vField]||0)-(a.properties[sc.vField]||0));
  let h=`<div class="top-section"><div class="top-section-title">得票數</div>`+
    row7(byV,p=>(p[sc.vField]||0).toLocaleString()+'票',pc)+`</div>`;

  if(sc.rField){
    const byR=[...fs].sort((a,b)=>(b.properties[sc.rField]||0)-(a.properties[sc.rField]||0));
    h+=`<div class="top-section"><div class="top-section-title">得票率</div>`+
      row7(byR,p=>((p[sc.rField]||0)*100).toFixed(2)+'%','#a5b4fc')+`</div>`;
  }
  if(sc.tField){
    const byT=[...fs].sort((a,b)=>(b.properties[sc.tField]||0)-(a.properties[sc.tField]||0));
    h+=`<div class="top-section"><div class="top-section-title">催票率</div>`+
      row7(byT,p=>((p[sc.tField]||0)*100).toFixed(2)+'%','#fbbf24')+`</div>`;
  }
  return h;
}

function goToVillage(name){
  const f=RAW.features.find(f=>f.properties.village===name);

  curVillageProps=f.properties;
  selectVillage(name);
  renderPanel();
  const layer=villageLayerMap[name];
  if(layer) map.fitBounds(layer.getBounds(),{maxZoom:16,padding:[40,40]});
}

// ── AI summary ──
async function triggerAI(){
  const sc=curScale;
  if(!sc||!sc.isParty)return;
  const fs=RAW.features;

  const byV=[...fs].sort((a,b)=>(b.properties[sc.vField]||0)-(a.properties[sc.vField]||0));
  const top1v=byV[0]?.properties;
  const top1vVal=(top1v?.[sc.vField]||0).toLocaleString();

  let top1rInfo='',top1tInfo='';
  if(sc.rField){
    const byR=[...fs].sort((a,b)=>(b.properties[sc.rField]||0)-(a.properties[sc.rField]||0));
    const t=byR[0]?.properties;
    top1rInfo=`得票率第1名：${t?.village}（${((t?.[sc.rField]||0)*100).toFixed(2)}%）`;
  }
  if(sc.tField){
    const byT=[...fs].sort((a,b)=>(b.properties[sc.tField]||0)-(a.properties[sc.tField]||0));
    const t=byT[0]?.properties;
    top1tInfo=`催票率第1名：${t?.village}（${((t?.[sc.tField]||0)*100).toFixed(2)}%）`;
  }

  // Render top7 immediately
  const t7=document.getElementById('top7-section');
  if(t7)t7.innerHTML=buildTop7(sc);

  const aiEl=document.getElementById('ai-content');
  if(!aiEl)return;

  const prompt=`你是高雄市三民區選舉地圖助手。用繁體中文寫1-2句說明，明確指出各指標第1名的里名。不要列名單。
選舉：${sc.label}
得票數第1名：${top1v?.village}（${top1vVal}票）
${top1rInfo}
${top1tInfo}
請說明這次選舉三個指標各自的第1名是哪個里。`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:prompt}]})
    });
    const d=await res.json();
    const txt=d.content?.find(c=>c.type==='text')?.text||'';
    if(aiEl)aiEl.innerHTML=`<div class="ai-summary">${txt||'（分析完成）'}</div>`;
  }catch(e){
    // fallback summary
    let fb=`得票數最高為<strong>${top1v?.village}</strong>（${top1vVal}票）`;
    if(top1rInfo)fb+='，'+top1rInfo.replace('得票率第1名：','得票率最高為');
    if(top1tInfo)fb+='，'+top1tInfo.replace('催票率第1名：','催票率最高為');
    if(aiEl)aiEl.innerHTML=`<div class="ai-summary">${fb}。</div>`;
  }
}

// ── Controls ──
function updateAvail(){
  const ybs=document.querySelectorAll('.y-btn'),tbs=document.querySelectorAll('.t-btn');
  if(curParty==='all'||curParty==='pop'){ybs.forEach(b=>b.disabled=true);tbs.forEach(b=>b.disabled=true);return;}
  const p=PARTIES[curParty];
  ybs.forEach(b=>{
    const y=b.dataset?.year;if(!y){b.disabled=true;return;}
    if(y==='2020'||y==='2018'){b.disabled=true;return;}
    b.disabled=(y==='2022'&&!p.fieldC);
  });
  tbs.forEach(b=>{
    const t=b.dataset.type;
    if(curYear==='2024'){
      if(t==='P')b.disabled=!p.fieldP;
      else if(t==='L')b.disabled=!p.fieldL;
      else b.disabled=true;
    }else if(curYear==='2022')b.disabled=(t!=='C');
    else b.disabled=true;
  });
}
function syncActive(){
  document.querySelectorAll('.y-btn').forEach(b=>b.classList.toggle('active',b.dataset?.year===curYear));
  document.querySelectorAll('.t-btn').forEach(b=>b.classList.toggle('active',b.dataset.type===curType));
}
function applyUpdate(){
  curScale=getActiveScale();
  if(geojsonLayer)geojsonLayer.setStyle(styleFn);
  updateLegend(curScale);updateAllTooltips();syncActive();
  curVillageProps=null;renderPanel();
}
function setParty(party,btn){
  curParty=party;
  if(party==='ana'){
    // analysis mode: grey map
  }
  document.querySelectorAll('#row-party .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(party!=='all'&&party!=='pop'){
    const p=PARTIES[party];
    if(!curYear)curYear='2024';
    if(curYear==='2022'&&!p.fieldC)curYear='2024';
    if(curYear==='2024'&&curType==='C')curType='P';
    if(curYear==='2024'&&curType==='L'&&!p.fieldL)curType='P';
    if(curYear==='2022')curType='C';
  }
  updateAvail();applyUpdate();
}
function setYear(year,btn){
  if(btn.disabled)return;
  curYear=year;
  if(year==='2022')curType='C';
  else if(year==='2024'){
    if(curType==='C')curType='P';
    if(curType==='L'&&!PARTIES[curParty]?.fieldL)curType='P';
  }
  updateAvail();applyUpdate();
}
function setType(type,btn){if(btn.disabled)return;curType=type;updateAvail();applyUpdate();}
function goBack(){curVillageProps=null;selectVillage(null);renderPanel();}

    chatHistory.push({role:'assistant',content:txt});
    appendMsg('assistant',txt||'抱歉，無法取得回答。');
  }catch(e){
    appendMsg('assistant','連線失敗，請稍後再試。');
  }
  chatLoading=false;document.getElementById('chat-send').disabled=false;
}

// ── Locate ──
function locateUser(){document.getElementById('locateBtn').style.opacity='0.5';map.locate({setView:true,maxZoom:16});}
map.on('locationfound',e=>{
  document.getElementById('locateBtn').style.opacity='1';
  L.circleMarker(e.latlng,{radius:8,fillColor:'#4285F4',color:'#fff',weight:2,fillOpacity:0.9}).addTo(map).bindPopup('你在這裡').openPopup();
});
map.on('locationerror',()=>{document.getElementById('locateBtn').style.opacity='1';alert('無法取得位置，請確認已允許定位權限。');});

// ── Init ──
function onEachFeature(feature,layer){
  // 建立 village → layer 對照表
  villageLayerMap[feature.properties.village]=layer;
  layer.on({
    mouseover:e=>{e.target.setStyle({weight:3.5,color:'#ffe500',fillOpacity:0.95,opacity:1});e.target.bringToFront();},
    mouseout: e=>{if(e.target!==villageLayerMap[selectedVillage])geojsonLayer.resetStyle(e.target);},
    click:    e=>{selectVillage(feature.properties.village);curVillageProps=feature.properties;renderPanel();}
  });
  layer.bindTooltip('',{permanent:true,direction:'center',className:'village-label',interactive:false});
}

(async()=>{
  const loadingEl = document.createElement('div');
  loadingEl.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:1.2rem;z-index:9999;background:rgba(0,0,0,.7);padding:1rem 2rem;border-radius:8px';
  loadingEl.textContent='載入地圖資料中…';
  document.body.appendChild(loadingEl);
  try{
    const res=await fetch('sanmin_vote.geojson');
    if(!res.ok)throw new Error('HTTP '+res.status);
    RAW=await res.json();
    AI_DATA=RAW.features.map(f=>{
      const p=f.properties;
      return{
        v:p.village, a:p.area,
        p26:p['pop2026.02'], pd:p._pop_diff,
        p26rk:p.pop26_rank, pdrk:p.pop_diff_rank,
        tsp22:p.tsp22, tsp22rk:p.tsp22_rk,
        tsp22v:p['tsp22_v%']?+(p['tsp22_v%']*100).toFixed(2):0,
        tsp22vrk:p['tsp22_v%rk'],
        tsp22t:p['tsp22_t%']?+(p['tsp22_t%']*100).toFixed(2):0,
        tsp22trk:p['tsp22_t%rk'],
        d24:p.dpp24_p, k24:p.kmt24_p, tp24:p.tpp24_p,
        tsp24:p.tsp24_P, n24:p.npp24_p, g24:p.gp24_p,
        o24:p.obs24_P, tot24:p._total24p
      };
    });
    document.body.removeChild(loadingEl);
    document.querySelector('[data-party="tsp"]').classList.add('active');
    document.querySelector('[data-year="2022"]').classList.add('active');
    document.querySelector('[data-type="C"]').classList.add('active');
    curScale=getActiveScale();
    geojsonLayer=L.geoJSON(RAW,{style:styleFn,onEachFeature}).addTo(map);
    map.fitBounds(geojsonLayer.getBounds(),{padding:[20,20]});
    updateLegend(curScale);updateAvail();updateAllTooltips();renderPanel();
  }catch(e){
    loadingEl.style.background='rgba(180,0,0,.85)';
    loadingEl.textContent='資料載入失敗：'+e.message+'（請確認 sanmin_vote.geojson 與 index.html 在同一資料夾）';
  }
})();

// ── Priority map overlay ──
function updatePriorityOverlay(){
  if(priorityLayer){map.removeLayer(priorityLayer);priorityLayer=null;}
  if(priorityVillages.size===0)return;
  const geoms=RAW.features.filter(f=>priorityVillages.has(f.properties.village));
  priorityLayer=L.geoJSON({type:'FeatureCollection',features:geoms},{
    style:{fillColor:'transparent',weight:3,color:'#ffe500',opacity:0.85,fillOpacity:0,dashArray:'5,4'},
    interactive:false
  }).addTo(map);
}

function togglePriority(name){
  if(priorityVillages.has(name))priorityVillages.delete(name);
  else priorityVillages.add(name);
  updatePriorityOverlay();
  renderPanel();
}

function clearPriority(){
  priorityVillages.clear();
  updatePriorityOverlay();
  renderPanel();
}

function setAnalysisTab(t){
  curAnalysisTab=t;
  renderPanel();
}

// ── Analysis layout ──
function renderAnalysis(){
  const tabs=[
    {id:'personal', label:'🧑 個人票估算'},
    {id:'thirdforce',label:'🌊 第三勢力票倉'},
    {id:'priority',  label:'⭐ 重點里標記'},
    {id:'calc',      label:'🧮 試算器'}
  ];
  const tabHtml=tabs.map(t=>`<button class="atab${curAnalysisTab===t.id?' active':''}" onclick="setAnalysisTab('${t.id}')">${t.label}</button>`).join('');
  let body='';
  if(curAnalysisTab==='personal')   body=renderPersonalVotes(RAW.features);
  else if(curAnalysisTab==='thirdforce') body=renderThirdForce(RAW.features);
  else if(curAnalysisTab==='priority')  body=renderPriority(RAW.features);
  else if(curAnalysisTab==='calc')      body=renderCalc(RAW.features);
  return`<div class="sidebar-section">
    <div class="sidebar-title">🎯 選情分析（無黨籍連任）</div>
    <div class="atab-bar">${tabHtml}</div>
    ${body}
  </div>`;
}

// ── 個人票估算：2022議員 - 2024基進不分區 ──
// 2022 = 個人票+黨票混合；2024基進 = 退黨後純黨票
// 差值大 → 這些票跟著人，不跟著黨，是朋友的「個人票」
function renderPersonalVotes(fs){
  const data=fs.map(f=>{
    const p=f.properties;
    const v22=p.tsp22||0;          // 2022 議員票
    const v24tsp=p.tsp24_P||0;     // 2024 基進不分區
    const personal=v22-v24tsp;     // 估計個人票（正 = 跟著人走）
    const personalPct=v22>0?(personal/v22*100):0;
    return{village:p.village,area:p.area,v22,v24tsp,personal,personalPct,
           tRate:p['tsp22_t%']||0};
  });

  const totV22=data.reduce((a,d)=>a+d.v22,0);
  const totV24=data.reduce((a,d)=>a+d.v24tsp,0);
  const totPersonal=data.reduce((a,d)=>a+Math.max(d.personal,0),0);

  // 正值：個人票強的里（可能跟著朋友走）
  const positives=[...data].filter(d=>d.personal>0)
    .sort((a,b)=>b.personal-a.personal).slice(0,10);
  // 負值：黨票重的里（朋友退黨後反而更多人投基進）⚠️
  const negatives=[...data].filter(d=>d.personal<0)
    .sort((a,b)=>a.personal-b.personal).slice(0,6);

  const mkRow=(d,i,showPct)=>{
    const isPos=d.personal>=0;
    const isPriority=priorityVillages.has(d.village);
    return`<div class="oppo-item" onclick="goToVillage('${d.village}')">
      <span class="oppo-rank">${i+1}</span>
      <span class="oppo-village">${isPriority?'<span class="priority-dot"></span>':''}${d.village}
        <span style="font-size:10px;color:var(--muted);margin-left:3px">${d.area}</span></span>
      <span style="font-size:10px;color:var(--muted);margin-right:4px">${d.v22}→${d.v24tsp}</span>
      <span class="oppo-val" style="color:${isPos?'var(--green)':'var(--red)'}">
        ${d.personal>0?'+':''}${d.personal}
        ${showPct?`<span style="font-size:10px;opacity:0.7">(${d.personalPct.toFixed(0)}%)</span>`:''}
      </span>
    </div>`;
  };

  return`
  <div class="analysis-intro">
    <b style="color:var(--text)">解讀方式</b><br>
    2022議員票（基進黨籍） − 2024基進不分區票 = 估計個人票。<br>
    差值越大 → 這些票可能是個人支持者，無黨籍連任時較可能跟著走。<br>
    <span style="color:var(--red)">差值為負 → 退黨後基進反而獲得更多票，這些是黨的鐵票，不確定會否轉移。</span>
  </div>
  <div class="calc-strategy">
    <div class="calc-strategy-title">全區概覽</div>
    <div class="calc-strategy-row"><span>2022 議員總票數</span><span>${totV22.toLocaleString()} 票</span></div>
    <div class="calc-strategy-row"><span>2024 基進不分區</span><span>${totV24.toLocaleString()} 票</span></div>
    <div class="calc-strategy-row"><span>差值（樂觀個人票估計）</span>
      <span style="color:${(totV22-totV24)>=0?'var(--green)':'var(--red)'}">
        ${(totV22-totV24)>0?'+':''}${(totV22-totV24).toLocaleString()} 票
      </span></div>
  </div>
  <div class="section-subtitle" style="margin-top:10px">🟢 個人票強勢里（較安全）</div>
  <div style="font-size:10px;color:var(--muted);margin-bottom:4px">2022議員→2024基進 · 差值=估計個人票</div>
  ${positives.map((d,i)=>mkRow(d,i,true)).join('')}
  <div class="section-subtitle" style="margin-top:10px">🔴 須注意：黨票重的里</div>
  <div style="font-size:10px;color:var(--muted);margin-bottom:4px">退黨後基進反而比2022更多票，這些里的票源忠誠度偏向黨</div>
  ${negatives.map((d,i)=>mkRow(d,i,false)).join('')}`;
}

// ── 第三勢力票倉 ──
// 2024年「非藍非綠」票(基進+時力+綠黨+歐巴桑) = 第三勢力潛在票倉
// 以無黨籍身分可嘗試爭取，但有不確定性（部分是黨鐵票）
function renderThirdForce(fs){
  const data=fs.map(f=>{
    const p=f.properties;
    const tsp=p.tsp24_P||0;
    const npp=p.npp24_p||0;
    const gp=p.gp24_p||0;
    const obs=p.obs24_P||0;
    const third=tsp+npp+gp+obs;
    const tot24=p._total24p||0;
    const thirdPct=tot24>0?(third/tot24*100):0;
    const v22=p.tsp22||0;
    const gain=third-v22; // 第三勢力票倉 vs 朋友2022基準
    return{village:p.village,area:p.area,tsp,npp,gp,obs,third,thirdPct,v22,gain,tot24};
  });

  const totThird=data.reduce((a,d)=>a+d.third,0);
  const totV22=data.reduce((a,d)=>a+d.v22,0);

  // 第三勢力大 且 高於2022基準 的里 = 有上升空間
  const potential=[...data].sort((a,b)=>b.gain-a.gain).slice(0,12);

  const maxThird=Math.max(...data.map(d=>d.third));

  const mkRow=(d,i)=>{
    const isPriority=priorityVillages.has(d.village);
    const w=(d.third/maxThird*80).toFixed(0);
    const pct=d.thirdPct.toFixed(1);
    return`<div class="oppo-item" onclick="goToVillage('${d.village}')">
      <span class="oppo-rank">${i+1}</span>
      <span class="oppo-village">${isPriority?'<span class="priority-dot"></span>':''}${d.village}
        <span style="font-size:10px;color:var(--muted);margin-left:3px">${d.area}</span></span>
      <span style="font-size:10px;color:var(--muted);text-align:right;min-width:55px">
        第三${d.third}票<br><span style="color:var(--muted)">${pct}%</span></span>
      <span class="oppo-val" style="color:${d.gain>=0?'var(--accent)':'var(--muted)'}">
        ${d.gain>0?'+':''}${d.gain}
      </span>
    </div>`;
  };

  // breakdown by party
  const totTSP=data.reduce((a,d)=>a+d.tsp,0);
  const totNPP=data.reduce((a,d)=>a+d.npp,0);
  const totGP=data.reduce((a,d)=>a+d.gp,0);
  const totOBS=data.reduce((a,d)=>a+d.obs,0);

  return`
  <div class="analysis-intro">
    <b style="color:var(--text)">第三勢力票倉</b> = 2024年基進＋時力＋綠黨＋歐巴桑不分區<br>
    以無黨籍身分參選，<span style="color:var(--green)">有機會爭取</span>這批選票，
    但基進鐵票是否認同退黨仍有<span style="color:var(--red)">不確定性</span>。
  </div>
  <div class="calc-strategy">
    <div class="calc-strategy-title">2024 第三勢力全區概覽</div>
    <div class="calc-strategy-row"><span>🔴 基進</span><span>${totTSP.toLocaleString()} 票</span></div>
    <div class="calc-strategy-row"><span>🟡 時代力量</span><span>${totNPP.toLocaleString()} 票</span></div>
    <div class="calc-strategy-row"><span>🟢 綠黨</span><span>${totGP.toLocaleString()} 票</span></div>
    <div class="calc-strategy-row"><span>🩷 歐巴桑</span><span>${totOBS.toLocaleString()} 票</span></div>
    <div class="calc-strategy-row" style="border-top:1px solid var(--border);margin-top:3px;padding-top:6px">
      <span><b>合計</b></span><span style="color:var(--accent)"><b>${totThird.toLocaleString()} 票</b></span></div>
    <div class="calc-strategy-row"><span>朋友2022議員票</span><span>${totV22.toLocaleString()} 票</span></div>
    <div class="calc-strategy-row"><span>理論增幅（若全部爭取）</span>
      <span style="color:${(totThird-totV22)>=0?'var(--green)':'var(--red)'}">
        ${(totThird-totV22)>0?'+':''}${(totThird-totV22).toLocaleString()} 票
      </span></div>
  </div>
  <div class="section-subtitle" style="margin-top:10px">第三勢力潛力最大的里</div>
  <div style="font-size:10px;color:var(--muted);margin-bottom:4px">第三勢力票數 vs 2022議員基準，正值=有成長空間</div>
  ${potential.map((d,i)=>mkRow(d,i)).join('')}`;
}

// ── 重點里標記 ──
function renderPriority(fs){
  const count=priorityVillages.size;
  const rows=fs.map(f=>{
    const p=f.properties;
    const v22=p.tsp22||0;
    const v24tsp=p.tsp24_P||0;
    const third=(p.tsp24_P||0)+(p.npp24_p||0)+(p.gp24_p||0)+(p.obs24_P||0);
    const chk=priorityVillages.has(p.village)?'checked':'';
    return`<div class="priority-item">
      <input type="checkbox" class="priority-check" ${chk} onchange="togglePriority('${p.village}')">
      <span class="priority-vname" onclick="goToVillage('${p.village}')">${p.village}</span>
      <span class="priority-sub">${p.area}<br>
        22議員${v22}票 · 24第三${third}票</span>
    </div>`;
  }).join('');

  return`<div class="priority-header">
    <span style="font-size:12px;color:var(--text)">已標記 <strong style="color:#ffe500">${count}</strong> 個里</span>
    ${count>0?`<button class="priority-clear" onclick="clearPriority()">清除全部</button>`:''}
  </div>
  ${count>0?`<div class="analysis-intro">⭐ 標記的里會在地圖上顯示黃色虛線邊框</div>`:''}
  <div class="section-subtitle">全部86里（點名稱可定位）</div>
  <div>${rows}</div>`;
}

// ── 試算器 ──
function renderCalc(fs){
  const tsp22Total=fs.reduce((a,f)=>a+(f.properties.tsp22||0),0);
  // 估計可爭取的票：個人票(樂觀) + 部分第三勢力增幅
  const personalPool=fs.reduce((a,f)=>{
    const diff=(f.properties.tsp22||0)-(f.properties.tsp24_P||0);
    return a+Math.max(diff,0);
  },0);
  const thirdPool=fs.reduce((a,f)=>{
    const t=(f.properties.tsp24_P||0)+(f.properties.npp24_p||0)+(f.properties.gp24_p||0)+(f.properties.obs24_P||0);
    return a+t;
  },0);

  if(!window._calcTarget) window._calcTarget=tsp22Total;
  const target=window._calcTarget;
  const gap=target-tsp22Total;
  const neededFromThird=Math.max(gap,0);
  const thirdCoverage=thirdPool>0?(neededFromThird/thirdPool*100).toFixed(0):0;
  const personalCoverage=personalPool>0?(Math.min(neededFromThird,personalPool)/personalPool*100).toFixed(0):0;

  return`<div class="calc-row">
    <span class="calc-label">2022 基準票數（議員）</span>
    <span class="calc-value">${tsp22Total.toLocaleString()} 票</span>
  </div>
  <div class="calc-row">
    <span class="calc-label" style="flex:0.7">目標票數</span>
    <div class="calc-input-wrap">
      <button style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:2px 8px;cursor:pointer" onclick="window._calcTarget=Math.max(0,(window._calcTarget||${tsp22Total})-50);renderPanel()">−</button>
      <input class="calc-input" type="number" value="${target}" min="0" max="9999" step="50"
        oninput="window._calcTarget=+this.value||${tsp22Total};renderPanel()">
      <button style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:2px 8px;cursor:pointer" onclick="window._calcTarget=(window._calcTarget||${tsp22Total})+50;renderPanel()">＋</button>
    </div>
  </div>
  <div class="calc-row">
    <span class="calc-label">需增加</span>
    <span class="calc-value" style="color:${gap<=0?'var(--green)':'var(--accent)'}">${gap<=0?'已達標 ✓':'+'+gap.toLocaleString()+' 票'}</span>
  </div>
  <div class="calc-strategy" style="margin-top:8px">
    <div class="calc-strategy-title">票源估算</div>
    <div class="calc-strategy-row"><span>個人票池（樂觀估計）</span><span style="color:var(--green)">${personalPool.toLocaleString()} 票</span></div>
    <div class="calc-strategy-row"><span>第三勢力總池</span><span style="color:var(--accent)">${thirdPool.toLocaleString()} 票</span></div>
  </div>
  ${gap>0?`
  <div class="calc-strategy" style="margin-top:6px">
    <div class="calc-strategy-title">需求分析</div>
    <div class="calc-strategy-row">
      <span>需爭取第三勢力的比例</span>
      <span style="color:${+thirdCoverage<30?'var(--green)':+thirdCoverage<60?'#fbbf24':'var(--red)'}">
        ${thirdCoverage}%
      </span>
    </div>
    <div class="calc-strategy-row">
      <span>個人票池是否足夠</span>
      <span style="color:${personalPool>=gap?'var(--green)':'var(--red)'}">
        ${personalPool>=gap?'✓ 個人票估計足夠':'需額外爭取第三勢力'}
      </span>
    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:6px;line-height:1.6">
      ⚠️ 個人票池為樂觀估計，實際轉移率取決於朋友與選民的連結強度
    </div>
  </div>`:'<div style="font-size:13px;color:var(--green);padding:12px 0;text-align:center">🎉 以現有基準已達目標！</div>'}`;
}

</script>
