<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>高雄三民區選舉地圖</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117; --panel: #1a1d27; --border: #2a2d3e;
      --accent: #4f7cff; --text: #e8eaf0; --muted: #7b82a0;
      --green: #22c55e; --red: #ef4444; --yellow: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    /* ── Layout ── */
    body { display: flex; flex-direction: column; }
    header { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); flex-shrink: 0; }
    header h1 { font-size: 15px; font-weight: 700; }
    header .sub { font-size: 11px; color: var(--muted); }

    .controls { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; white-space: nowrap; }
    .controls-label { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; flex-shrink: 0; }
    .btn { padding: 5px 11px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Noto Sans TC', sans-serif; font-size: 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
    .btn:hover { border-color: var(--accent); color: var(--text); }
    .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

    /* Desktop: map + sidebar side by side */
    .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    #map { flex: 1; background: #151820; min-width: 0; }

    /* Sidebar desktop */
    .sidebar { width: 230px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
    .sidebar-section { padding: 14px; border-bottom: 1px solid var(--border); }
    .sidebar-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }

    /* Info panel content */
    .info-placeholder { font-size: 12px; color: var(--muted); line-height: 1.7; }
    .info-village { font-size: 18px; font-weight: 700; color: var(--text); }
    .info-area { font-size: 11px; color: var(--muted); margin-bottom: 10px; }
    .stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 1px solid var(--border); }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { font-size: 11px; color: var(--muted); flex: 1; }
    .stat-value { font-size: 13px; font-weight: 600; color: var(--text); text-align: right; }
    .stat-value.hl { color: var(--accent); }
    .stat-value.pos { color: var(--green); }
    .stat-value.neg { color: var(--red); }

    /* Section header inside info */
    .info-section-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin: 10px 0 4px; padding-top: 8px; border-top: 1px solid var(--border); }

    /* Party bar chart */
    .party-bar-wrap { margin-top: 6px; }
    .party-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .party-name { font-size: 11px; color: var(--muted); width: 44px; flex-shrink: 0; }
    .party-bar-bg { flex: 1; height: 10px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .party-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .party-val { font-size: 11px; color: var(--muted); width: 36px; text-align: right; flex-shrink: 0; }

    /* Legend */
    .legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; font-size: 11px; color: var(--muted); }
    .legend-swatch { width: 16px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* Stats */
    .stat-row-sm { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
    .stat-row-sm:last-child { border-bottom: none; }

    /* Leaflet overrides */
    .leaflet-container { background: #151820; }
    .leaflet-control-zoom a { background: var(--panel) !important; color: var(--text) !important; border-color: var(--border) !important; }
    .leaflet-control-attribution { background: rgba(26,29,39,0.85) !important; color: var(--muted) !important; font-size: 9px !important; }
    .leaflet-control-attribution a { color: var(--accent) !important; }
    .village-label {
      background: transparent !important; border: none !important; box-shadow: none !important;
      font-family: 'Noto Sans TC', sans-serif; font-size: 10px; font-weight: 700; color: #fff;
      pointer-events: none; white-space: nowrap;
      text-shadow: -1px -1px 2px rgba(0,0,0,0.95), 1px -1px 2px rgba(0,0,0,0.95),
                   -1px 1px 2px rgba(0,0,0,0.95), 1px 1px 2px rgba(0,0,0,0.95);
    }
    .village-label::before { display: none !important; }

    /* Geolocate button */
    .locate-btn {
      position: absolute; bottom: 30px; left: 10px; z-index: 1000;
      width: 34px; height: 34px; border-radius: 4px;
      background: var(--panel); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: all 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    .locate-btn:hover { border-color: var(--accent); color: var(--accent); }
    .locate-btn.locating { color: var(--accent); border-color: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    /* ── Mobile: sidebar becomes bottom panel ── */
    @media (max-width: 640px) {
      .main { flex-direction: column; }
      #map { flex: none; height: 55vh; width: 100%; }
      .sidebar {
        width: 100%; height: 45vh; border-left: none;
        border-top: 1px solid var(--border);
        flex-direction: row; overflow-x: auto; overflow-y: hidden;
      }
      .sidebar-section { min-width: 200px; border-bottom: none; border-right: 1px solid var(--border); flex-shrink: 0; overflow-y: auto; height: 100%; }
      header h1 { font-size: 13px; }
      .locate-btn { bottom: 46vh; }
    }
  </style>
</head>

<header>
  <div class="dot"></div>
  <div>

</header>

<div class="controls">
  <span class="controls-label">顯示</span>

<div class="main">

  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">里別資訊</div>
      <div id="info-content">
        <div class="info-placeholder">點擊地圖上的里界，<br>查看該里的詳細資料。</div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">圖例</div>
      <div id="legend-content"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">全區統計</div>
      <div id="stats-content" class="info-placeholder">載入中...</div>
    </div>
  </div>
</div>

let geojsonLayer = null;

// Map init
const map = L.map('map', { zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© CARTO', subdomains: 'abcd', maxZoom: 19
}).addTo(map);

function getColor(field, v) {
  const s = SCALES[field];
  if (v == null) return '#2a2d3e';
  for (let i = 0; i < s.breaks.length; i++) if (v < s.breaks[i]) return s.colors[i];
  return s.colors[s.colors.length-1];
}

function styleFn(feature) {
  return { fillColor: getColor(currentField, feature.properties[currentField]), weight:1, opacity:0.5, color:'#1a1d27', fillOpacity:0.88 };
}

function showInfo(props) {
  const total24 = props._total24 || 0;
  const popDiff = (props['pop2026.02']||0) - (props.pop2022||0);
  const popDiffStr = (popDiff > 0 ? '+' : '') + popDiff;
  const popClass = popDiff > 0 ? 'pos' : popDiff < 0 ? 'neg' : '';

  // Party bars
  const partyKeys = ['dpp24_p','kmt24_p','tpp24_p','npp24_p','gp24_p','obs2024'];
  let barsHTML = '';
  partyKeys.forEach(k => {
    const v = props[k] || 0;
    if (!v) return;
    const pct = total24 > 0 ? (v/total24*100).toFixed(1) : 0;
    const w = total24 > 0 ? (v/total24*100) : 0;
    barsHTML += `<div class="party-row">
      <div class="party-name">${PARTY_NAMES[k]}</div>
      <div class="party-bar-bg"><div class="party-bar-fill" style="width:${w}%;background:${PARTY_COLORS[k]}"></div></div>
      <div class="party-val">${pct}%</div>
    </div>`;
  });

  document.getElementById('info-content').innerHTML = `
    <div class="info-village">${props.village || '-'}</div>
    <div class="info-area">${props.area||''} · ${props.district||''}</div>

    <div class="info-section-title">👥 人口</div>
    <div class="stat-row"><span class="stat-label">2022 人口</span><span class="stat-value">${(props.pop2022||0).toLocaleString()}</span></div>
    <div class="stat-row"><span class="stat-label">最新人口</span><span class="stat-value">${(props['pop2026.02']||0).toLocaleString()}</span></div>
    <div class="stat-row"><span class="stat-label">增減</span><span class="stat-value ${popClass}">${popDiffStr} 人</span></div>

    <div class="info-section-title">🗳️ 2024 各黨得票</div>
    <div class="stat-row"><span class="stat-label">總票數</span><span class="stat-value hl">${total24.toLocaleString()}</span></div>
    <div class="party-bar-wrap">${barsHTML}</div>

    <div class="info-section-title">🗳️ 2022 選情</div>
    <div class="stat-row"><span class="stat-label">得票數</span><span class="stat-value">${props.vote2022 ?? '-'} 票</span></div>
    <div class="stat-row"><span class="stat-label">催票率</span><span class="stat-value">${props.trate2022 ? (props.trate2022*100).toFixed(2)+'%' : '-'}</span></div>
    <div class="stat-row"><span class="stat-label">催票率排名</span><span class="stat-value">${props.trate22_rank ?? '-'}</span></div>
    <div class="stat-row"><span class="stat-label">得票排名</span><span class="stat-value">${props.vote22_rank ?? '-'}</span></div>
  `;
}

function updateLegend(field) {
  const s = SCALES[field];
  document.getElementById('legend-content').innerHTML =
    `<div style="font-size:11px;color:var(--accent);margin-bottom:6px">${s.label}</div>` +
    s.labels.map((l,i) =>
      `<div class="legend-item"><div class="legend-swatch" style="background:${s.colors[i]}"></div>${l}</div>`
    ).join('');
}

function switchLayer(field, btn) {
  currentField = field;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (geojsonLayer) geojsonLayer.setStyle(styleFn);
  updateLegend(field);
  document.getElementById('info-content').innerHTML =
    '<div class="info-placeholder">點擊地圖上的里界，<br>查看該里的詳細資料。</div>';
}

function onEachFeature(feature, layer) {
  layer.on({
    mouseover: e => { e.target.setStyle({weight:2.5,color:'#fff',fillOpacity:0.95}); e.target.bringToFront(); showInfo(feature.properties); },
    mouseout: e => geojsonLayer.resetStyle(e.target),
    click: e => { e.target.setStyle({weight:2.5,color:'#fff',fillOpacity:0.95}); e.target.bringToFront(); showInfo(feature.properties); }
  });
  layer.bindTooltip(feature.properties.village||'', { permanent:true, direction:'center', className:'village-label' });
}

// 定位功能
function locateUser() {
  const btn = document.getElementById('locateBtn');
  btn.classList.add('locating');
  btn.textContent = '⌛';
  map.locate({ setView: true, maxZoom: 16 });
}
map.on('locationfound', e => {
  const btn = document.getElementById('locateBtn');
  btn.classList.remove('locating');
  btn.textContent = '📍';
  L.circleMarker(e.latlng, {
    radius: 8, fillColor: '#4f7cff', color: '#fff',
    weight: 2, opacity: 1, fillOpacity: 0.9
  }).addTo(map).bindPopup('你在這裡').openPopup();
});
map.on('locationerror', () => {
  const btn = document.getElementById('locateBtn');
  btn.classList.remove('locating');
  btn.textContent = '📍';
  alert('無法取得您的位置，請確認已允許定位權限。');
});

// 載入地圖
geojsonLayer = L.geoJSON(RAW, { style: styleFn, onEachFeature }).addTo(map);
map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });
updateLegend(currentField);

// 全區統計
const feats = RAW.features;
const total24all = feats.reduce((s,f) => s+(f.properties._total24||0), 0);
const dppTotal = feats.reduce((s,f) => s+(f.properties.dpp24_p||0), 0);
const kmtTotal = feats.reduce((s,f) => s+(f.properties.kmt24_p||0), 0);
const tppTotal = feats.reduce((s,f) => s+(f.properties.tpp24_p||0), 0);
const pop22 = feats.reduce((s,f) => s+(f.properties.pop2022||0), 0);
const pop26 = feats.reduce((s,f) => s+(f.properties['pop2026.02']||0), 0);
const popD = pop26 - pop22;
document.getElementById('stats-content').innerHTML = `
  <div class="stat-row-sm"><span style="color:var(--muted)">里數</span><span>${feats.length}</span></div>
  <div class="stat-row-sm"><span style="color:var(--muted)">2024 總票數</span><span style="color:var(--accent)">${total24all.toLocaleString()}</span></div>
  <div class="stat-row-sm"><span style="color:var(--muted)">民進黨</span><span style="color:#dc2626">${(dppTotal/total24all*100).toFixed(1)}%</span></div>
  <div class="stat-row-sm"><span style="color:var(--muted)">國民黨</span><span style="color:#60a5fa">${(kmtTotal/total24all*100).toFixed(1)}%</span></div>
  <div class="stat-row-sm"><span style="color:var(--muted)">民眾黨</span><span style="color:#2dd4bf">${(tppTotal/total24all*100).toFixed(1)}%</span></div>
  <div class="stat-row-sm"><span style="color:var(--muted)">最新人口</span><span>${pop26.toLocaleString()}</span></div>
  <div class="stat-row-sm"><span style="color:var(--muted)">人口增減</span><span style="color:${popD>=0?'#22c55e':'#ef4444'}">${(popD>0?'+':'')+popD.toLocaleString()}</span></div>
`;
</script>
</body>
</html>
