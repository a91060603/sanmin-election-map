<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>高雄三民區選舉地圖</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f1117;--panel:#1a1d27;--border:#2a2d3e;
      --accent:#4f7cff;--text:#e8eaf0;--muted:#8892aa;
      --green:#22c55e;--red:#ef4444;
      --dpp:#1B9431;--kmt:#003F8E;--tpp:#28C8C8;
      --npp:#FBBE01;--tsp:#C00000;--gp:#66BB6A;--obs:#E91E8C;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Noto Sans TC',sans-serif;font-size:14px;background:var(--bg);color:var(--text);overflow:hidden;}
    body{display:flex;flex-direction:column;}

    header{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);flex-shrink:0;}
    header h1{font-size:15px;font-weight:700;}
    header .sub{font-size:11px;color:var(--muted);}

    .filter-area{background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
    .filter-row{display:flex;align-items:center;gap:5px;padding:5px 14px;overflow-x:auto;white-space:nowrap;border-bottom:1px solid var(--border);}
    .filter-row:last-child{border-bottom:none;}
    .filter-label{font-size:11px;color:var(--muted);flex-shrink:0;width:30px;}
    .fbtn{padding:4px 11px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans TC',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
    .fbtn:hover:not(:disabled){border-color:var(--accent);color:var(--text);}
    .fbtn:disabled{opacity:0.22;cursor:not-allowed;}
    .fbtn.active{color:#fff;font-weight:500;}
    .fbtn.active.p-dpp{background:var(--dpp);border-color:var(--dpp);}
    .fbtn.active.p-kmt{background:var(--kmt);border-color:var(--kmt);}
    .fbtn.active.p-tpp{background:var(--tpp);border-color:var(--tpp);color:#0f1117;}
    .fbtn.active.p-npp{background:var(--npp);border-color:var(--npp);color:#0f1117;}
    .fbtn.active.p-tsp{background:var(--tsp);border-color:var(--tsp);}
    .fbtn.active.p-gp{background:var(--gp);border-color:var(--gp);color:#0f1117;}
    .fbtn.active.p-obs{background:var(--obs);border-color:var(--obs);}
    .fbtn.active.p-pop,.fbtn.active.p-all,.fbtn.active.y-btn,.fbtn.active.t-btn{background:var(--accent);border-color:var(--accent);}

    .main{display:flex;flex:1;overflow:hidden;min-height:0;}
    #map{flex:1;background:#151820;min-width:0;position:relative;}

    /* Legend on map bottom-right */
    #legend-overlay{
      position:absolute;bottom:36px;right:10px;z-index:900;
      background:rgba(20,23,33,0.93);border:1px solid var(--border);
      border-radius:6px;padding:10px 12px;min-width:150px;
      backdrop-filter:blur(4px);pointer-events:none;
    }
    .legend-title{font-size:12px;color:var(--accent);font-weight:500;margin-bottom:6px;}
    .legend-item{display:flex;align-items:center;gap:6px;margin-bottom:4px;font-size:11px;color:var(--muted);}
    .legend-swatch{width:14px;height:9px;border-radius:2px;flex-shrink:0;}

    /* Sidebar */
    .sidebar{
      width:38%;max-width:480px;min-width:270px;
      background:var(--panel);border-left:1px solid var(--border);
      display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
    }
    .sidebar-inner{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;}
    .sidebar-section{padding:13px 15px;border-bottom:1px solid var(--border);}
    .sidebar-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}

    .back-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;margin-bottom:10px;padding:4px 0;border:none;background:none;transition:color 0.15s;}
    .back-btn:hover{color:var(--accent);}

    .info-placeholder{font-size:13px;color:var(--muted);line-height:1.8;}
    .info-village{font-size:20px;font-weight:700;color:var(--text);}
    .info-area{font-size:12px;color:var(--muted);margin-bottom:6px;}
    .info-section-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin:10px 0 5px;padding-top:8px;border-top:1px solid var(--border);}
    .stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--border);}
    .stat-row:last-child{border-bottom:none;}
    .stat-label{font-size:12px;color:var(--muted);flex:1;}
    .stat-value{font-size:13px;font-weight:600;color:var(--text);text-align:right;}
    .rank-badge{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px;}
    .hl{color:var(--accent);}.pos{color:var(--green);}.neg{color:var(--red);}

    /* Party bars */
    .party-bar-wrap{margin-top:5px;}
    .party-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
    .pname{font-size:12px;width:56px;flex-shrink:0;}
    .pbar-bg{flex:1;height:9px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
    .pbar-fill{height:100%;border-radius:2px;transition:width 0.3s;}
    .pstats{font-size:11px;color:var(--muted);width:100px;text-align:right;flex-shrink:0;}

    /* Top-7 */
    .top-section{margin-bottom:12px;}
    .top-section-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--border);}
    .top-item{display:flex;align-items:baseline;gap:6px;padding:3px 0;font-size:12px;}
    .top-rank{font-size:11px;color:var(--accent);font-weight:700;width:18px;flex-shrink:0;}
    .top-village{flex:1;color:var(--text);}
    .top-val{font-size:11px;color:var(--muted);text-align:right;}

    /* AI summary */
    .ai-summary{font-size:13px;line-height:1.8;color:var(--text);padding:4px 0 8px;}
    .ai-loading{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;padding:4px 0 8px;}
    .ai-spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Stats overview */
    .stat-sm{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border);}
    .stat-sm:last-child{border-bottom:none;}
    .stat-sm .lbl{color:var(--muted);}

    /* AI Chat */
    .ai-chat-area{border-top:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;max-height:210px;}
    .ai-chat-header{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;flex-shrink:0;user-select:none;}
    .ai-chat-header span{font-size:12px;color:var(--muted);}
    .ai-chat-toggle{font-size:12px;color:var(--muted);}
    .ai-chat-msgs{flex:1;overflow-y:auto;padding:6px 12px;display:flex;flex-direction:column;gap:5px;min-height:0;}
    .msg{font-size:12px;line-height:1.6;padding:6px 10px;border-radius:6px;max-width:92%;word-break:break-all;}
    .msg.user{background:var(--accent);color:#fff;align-self:flex-end;}
    .msg.assistant{background:#22253a;color:var(--text);align-self:flex-start;}
    .ai-chat-input-row{display:flex;gap:6px;padding:7px 12px;flex-shrink:0;border-top:1px solid var(--border);}
    .ai-input{flex:1;background:#22253a;border:1px solid var(--border);border-radius:4px;padding:5px 9px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;}
    .ai-input:focus{border-color:var(--accent);}
    .ai-send{padding:5px 11px;background:var(--accent);border:none;border-radius:4px;color:#fff;font-size:12px;cursor:pointer;flex-shrink:0;}
    .ai-send:disabled{opacity:0.4;cursor:not-allowed;}

    /* Locate */
    .locate-btn{position:absolute;bottom:36px;left:10px;z-index:1000;width:32px;height:40px;background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));}
    .locate-btn:hover{filter:drop-shadow(0 2px 6px rgba(79,124,255,0.7));}

    /* Leaflet */
    .leaflet-container{background:#151820;}
    .leaflet-control-zoom a{background:var(--panel)!important;color:var(--text)!important;border-color:var(--border)!important;}
    .leaflet-control-attribution{background:rgba(15,17,23,0.85)!important;color:var(--muted)!important;font-size:9px!important;}

    /* Village label - permanent tooltip */
    .village-label{
      background:transparent!important;border:none!important;box-shadow:none!important;
      font-family:'Noto Sans TC',sans-serif;color:#fff;pointer-events:none;
      text-align:center;line-height:1.45;white-space:nowrap;
      text-shadow:-1px -1px 2px rgba(0,0,0,0.95),1px -1px 2px rgba(0,0,0,0.95),
                  -1px 1px 2px rgba(0,0,0,0.95),1px 1px 2px rgba(0,0,0,0.95);
    }
    .village-label::before{display:none!important;}
    .village-label .vl-name{display:block;font-weight:700;}
    .village-label .vl-stat{display:block;opacity:0.9;}
    .village-label .vl-stat.hidden{display:none;}

    /* Mobile */
    @media(max-width:640px){
      .main{flex-direction:column;}
      #map{flex:none;height:52vh;width:100%;}
      .sidebar{width:100%;max-width:none;min-width:0;height:48vh;border-left:none;border-top:1px solid var(--border);flex-direction:row;overflow-x:auto;}
      .sidebar-inner{display:flex;flex-direction:row;height:calc(100% - 80px);width:max-content;}
      .sidebar-section{min-width:220px;max-width:300px;border-bottom:none;border-right:1px solid var(--border);flex-shrink:0;overflow-y:auto;height:100%;}
      .ai-chat-area{min-width:220px;border-top:none;border-right:1px solid var(--border);}
      .locate-btn{bottom:49vh;}
      #legend-overlay{bottom:auto;top:8px;right:8px;}
    }
  </style>
</head>
<body>
<header>
  <div class="dot"></div>
  <div><div class="sub">高雄市</div><h1>三民區選舉地圖</h1></div>
</header>

<div class="filter-area">
  <div class="filter-row" id="row-year">
    <span class="filter-label">年分</span>
    <button class="fbtn y-btn" data-year="2024" onclick="setYear('2024',this)">2024</button>
    <button class="fbtn y-btn" data-year="2022" onclick="setYear('2022',this)">2022</button>
    <button class="fbtn y-btn" disabled>2020</button>
    <button class="fbtn y-btn" disabled>2018</button>
  </div>
  <div class="filter-row" id="row-party">
    <span class="filter-label">政黨</span>
    <button class="fbtn p-all" data-party="all" onclick="setParty('all',this)">全區綜覽</button>
    <button class="fbtn p-dpp" data-party="dpp" onclick="setParty('dpp',this)">民進黨</button>
    <button class="fbtn p-kmt" data-party="kmt" onclick="setParty('kmt',this)">國民黨</button>
    <button class="fbtn p-tpp" data-party="tpp" onclick="setParty('tpp',this)">民眾黨</button>
    <button class="fbtn p-npp" data-party="npp" onclick="setParty('npp',this)">時代力量</button>
    <button class="fbtn p-tsp" data-party="tsp" onclick="setParty('tsp',this)">台灣基進</button>
    <button class="fbtn p-gp"  data-party="gp"  onclick="setParty('gp',this)">綠黨</button>
    <button class="fbtn p-obs" data-party="obs" onclick="setParty('obs',this)">歐巴桑</button>
    <button class="fbtn p-pop" data-party="pop" onclick="setParty('pop',this)">人口資訊</button>
  </div>
  <div class="filter-row" id="row-type">
    <span class="filter-label">種類</span>
    <button class="fbtn t-btn" data-type="P" onclick="setType('P',this)">不分區</button>
    <button class="fbtn t-btn" data-type="L" onclick="setType('L',this)">區域立委</button>
    <button class="fbtn t-btn" data-type="C" onclick="setType('C',this)">議員</button>
  </div>
</div>

<div class="main">
  <div id="map">
    <button class="locate-btn" id="locateBtn" onclick="locateUser()" title="定位我的位置">
      <svg width="24" height="36" viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.4 0 0 5.4 0 12c0 8.4 12 24 12 24S24 20.4 24 12C24 5.4 18.6 0 12 0z" fill="#4285F4"/>
        <circle cx="12" cy="12" r="5.5" fill="white"/>
        <circle cx="12" cy="12" r="3.5" fill="#4285F4"/>
      </svg>
    </button>
    <div id="legend-overlay"></div>
  </div>

  <div class="sidebar">
    <div class="sidebar-inner" id="sidebar-inner">
      <div id="main-panel"></div>
    </div>
    <div class="ai-chat-area" id="ai-chat-area">
      <div class="ai-chat-header" onclick="toggleChat()">
        <span>💬 詢問地圖資料</span>
        <span class="ai-chat-toggle" id="chat-toggle">▼</span>
      </div>
      <div class="ai-chat-msgs" id="chat-msgs"></div>
      <div class="ai-chat-input-row" id="chat-input-row">
        <input class="ai-input" id="chat-input" placeholder="例：哪個里催票率最高？" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="ai-send" id="chat-send" onclick="sendChat()">送出</button>
      </div>
    </div>
  </div>
</div>

  return Array.from({length:steps},(_,i)=>{

    return `rgb(${Math.round(r+(255-r)*t*0.88)},${Math.round(g+(255-g)*t*0.88)},${Math.round(b+(255-b)*t*0.88)})`;

  return{
    label,isParty:true,partyKey:party,
    vField,rField,tRkField:rRkField,vRkField,rRkField,isRate,
    displayField,breaks:q.slice(1,5),
    colors:colorsFwd,  // map colors (low→high = light→dark)
    legendColors:colorsRev,  // legend display (high on top)
    legendLabels:labelsRev,
    fmt,party:p
  };
}

const POP_SCALE={
  label:'人口增減（vs 2022）',isPop:true,displayField:'_pop_diff',
  breaks:[-150,-50,0,100,300],
  colors:['#450a0a','#dc2626','#fca5a5','#d1fae5','#22c55e','#14532d'],
  legendColors:['#14532d','#22c55e','#d1fae5','#fca5a5','#dc2626','#450a0a'],
  legendLabels:['> 300','100~300','0~100','−50~0','−150~−50','< −150'],
  fmt:v=>(v>0?'+':'')+v.toLocaleString()+' 人'
};

function GRAY(){return{label:'',isOverview:true,displayField:'_pop_diff',breaks:[-9999],colors:['#1e2235'],legendColors:[],legendLabels:[],fmt:v=>v};}

function getActiveScale(){
  if(curParty==='all')return GRAY();
  if(curParty==='pop')return POP_SCALE;
  return buildScale(curParty,curYear,curType)||GRAY();
}

// ── Map ──
const map=L.map('map',{zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'© CARTO',subdomains:'abcd',maxZoom:19
}).addTo(map);

function styleFn(f){
  return{fillColor:getColor(curScale,f.properties[curScale.displayField]),weight:1,opacity:0.5,color:'#1a1d27',fillOpacity:0.88};
}

// ── Zoom-based tooltip ──
// Threshold: show stats only at zoom >= 15
const ZOOM_SHOW_STATS=15;
const ZOOM_SHOW_LABEL=12;

function tooltipHTML(props){
  const z=map.getZoom();
  if(z<ZOOM_SHOW_LABEL)return '';
  // Font size scales with zoom
  const nfs=Math.max(10,Math.min(14, 8+z-10));
  const sfs=Math.max(9,Math.min(12, 7+z-10));
  const showStats=(z>=ZOOM_SHOW_STATS);
  const scale=curScale;
  let statLines='';
  if(showStats&&scale&&!scale.isOverview){
    if(scale.isPop){
      const diff=props._pop_diff||0;
      const c=diff>0?'#22c55e':diff<0?'#ef4444':'#aaa';
      const ds=(diff>0?'+':'')+diff.toLocaleString();
      statLines=`<span class="vl-stat" style="font-size:${sfs}px;color:${c}">${ds}人</span>`;
    }else if(scale.isParty){
      const v=props[scale.vField]||0;
      const vRk=props[scale.vRkField]||'-';
      statLines=`<span class="vl-stat" style="font-size:${sfs}px">${v.toLocaleString()}票(${vRk}/86)</span>`;
      if(scale.rField){
        const rt=((props[scale.rField]||0)*100).toFixed(1);
        const rRk=props[scale.tRkField]||'-';
        statLines+=`<span class="vl-stat" style="font-size:${sfs}px">${rt}%(${rRk}/86)</span>`;
      }
    }
  }
  return `<span class="vl-name" style="font-size:${nfs}px">${props.village||''}</span>${statLines}`;
}

function updateAllTooltips(){
  if(!geojsonLayer)return;
  geojsonLayer.eachLayer(l=>{
    l.setTooltipContent(tooltipHTML(l.feature.properties));
  });
}
map.on('zoomend',updateAllTooltips);

// ── Legend ──
function updateLegend(scale){
  const el=document.getElementById('legend-overlay');
  if(!scale||scale.isOverview||!scale.legendLabels||!scale.legendLabels.length){el.innerHTML='';return;}
  el.innerHTML=`<div class="legend-title">${scale.label}</div>`+
    scale.legendLabels.map((l,i)=>`<div class="legend-item"><div class="legend-swatch" style="background:${scale.legendColors[i]}"></div>${l}</div>`).join('');
}

// ── Panel rendering ──
function renderPanel(){
  const el=document.getElementById('main-panel');
  if(curVillageProps){el.innerHTML=renderVillage(curVillageProps);return;}
  if(curParty==='all'){el.innerHTML=renderOverview();return;}
  if(curParty==='pop'){el.innerHTML=renderPopPanel();return;}
  el.innerHTML=renderFilterPanel();
  triggerAI();
}

function renderOverview(){
  const fs=RAW.features;
  const tot=fs.reduce((s,f)=>s+(f.properties._total24p||0),0);
  const p26=fs.reduce((s,f)=>s+(f.properties['pop2026.02']||0),0);
  const p22=fs.reduce((s,f)=>s+(f.properties.pop2022||0),0);
  const pd=p26-p22;
  let h=`<div class="sidebar-section"><div class="sidebar-title">全區統計</div>
    <div class="stat-sm"><span class="lbl">里數</span><span>86</span></div>
    <div class="stat-sm"><span class="lbl">2024 不分區總票數</span><span style="color:var(--accent)">${tot.toLocaleString()}</span></div>`;
  Object.entries(PARTIES).forEach(([k,p])=>{
    const t=fs.reduce((s,f)=>s+(f.properties[p.fieldP]||0),0);
    if(!t)return;
    h+=`<div class="stat-sm"><span class="lbl" style="color:${p.dc}">${p.name}</span><span>${t.toLocaleString()} <span style="color:var(--muted);font-size:11px">(${(t/tot*100).toFixed(1)}%)</span></span></div>`;
  });
  h+=`</div><div class="sidebar-section"><div class="sidebar-title">人口</div>
    <div class="stat-sm"><span class="lbl">最新人口</span><span>${p26.toLocaleString()}</span></div>
    <div class="stat-sm"><span class="lbl">人口增減</span><span style="color:${pd>=0?'#22c55e':'#ef4444'}">${(pd>0?'+':'')+pd.toLocaleString()}</span></div>
  </div>`;
  return h;
}

function renderPopPanel(){
  const fs=RAW.features;
  const byPop=[...fs].sort((a,b)=>(b.properties['pop2026.02']||0)-(a.properties['pop2026.02']||0));
  const byDiff=[...fs].sort((a,b)=>(b.properties._pop_diff||0)-(a.properties._pop_diff||0));
  const fmt7=(arr,fn)=>arr.slice(0,7).map((f,i)=>{
    const p=f.properties;const{val,sub}=fn(p);
    return`<div class="top-item"><span class="top-rank">${i+1}</span><span class="top-village">${p.village}</span><span class="top-val">${val}</span></div>`;
  }).join('');
  return`<div class="sidebar-section"><div class="sidebar-title">最新人口 前7里</div>`+
    fmt7(byPop,p=>({val:(p['pop2026.02']||0).toLocaleString()+'人'}))+`</div>`+
    `<div class="sidebar-section"><div class="sidebar-title">人口增減 前7里</div>`+
    byDiff.slice(0,7).map((f,i)=>{
      const p=f.properties;const d=p._pop_diff||0;const c=d>0?'#22c55e':'#ef4444';
      return`<div class="top-item"><span class="top-rank">${i+1}</span><span class="top-village">${p.village}</span><span class="top-val" style="color:${c}">${(d>0?'+':'')+d.toLocaleString()}</span></div>`;
    }).join('')+`</div>`;
}

function renderFilterPanel(){
  const scale=curScale;
  if(!scale||scale.isOverview)return`<div class="sidebar-section"><div class="info-placeholder">請選擇政黨與選舉種類。</div></div>`;
  return`<div class="sidebar-section" id="ai-section">
    <div class="sidebar-title">${scale.label}</div>
    <div id="ai-content"><div class="ai-loading"><div class="ai-spinner"></div>AI 分析中...</div></div>
  </div>
  <div class="sidebar-section" id="top7-section"></div>`;
}

// ── Top-7 three metrics ──
function buildTop7HTML(scale){
  const fs=RAW.features;
  // 得票數
  const byVote=[...fs].sort((a,b)=>(b.properties[scale.vField]||0)-(a.properties[scale.vField]||0));
  // 催票率（若有 rField）
  const byRate=scale.rField?[...fs].sort((a,b)=>(b.properties[scale.rField]||0)-(a.properties[scale.rField]||0)):null;
  // 得票率：目前 2022 沒有候選人總票數，暫不顯示；2024 有 rate
  // For 2022 tsp: no vrate, only trate
  // For 2024: rate = party votes / total
  const hasVRate=(curYear==='2024'&&scale.rField);

  const row7=(arr,vfn,color)=>arr.slice(0,7).map((f,i)=>{
    const v=vfn(f.properties);
    return`<div class="top-item"><span class="top-rank">${i+1}</span><span class="top-village">${f.properties.village}</span><span class="top-val" style="color:${color}">${v}</span></div>`;
  }).join('');

  let h=`<div class="top-section"><div class="top-section-title">得票數</div>`+
    row7(byVote,p=>(p[scale.vField]||0).toLocaleString()+'票',scale.party?.dc||'var(--accent)')+`</div>`;

  if(hasVRate){
    h+=`<div class="top-section"><div class="top-section-title">得票率</div>`+
      row7(byRate,p=>((p[scale.rField]||0)*100).toFixed(1)+'%','#a5b4fc')+`</div>`;
  }

  if(scale.rField&&curYear==='2022'){
    h+=`<div class="top-section"><div class="top-section-title">催票率</div>`+
      row7(byRate,p=>((p[scale.rField]||0)*100).toFixed(2)+'%','#fbbf24')+`</div>`;
  } else if(scale.rField&&curYear==='2024'){
    // For 2024, the rate is vote rate. Add trate separately if available
    // We only have _tsp22_rate for 2022, not 2024 trate
  }

  return h;
}

// ── AI trigger ──
async function triggerAI(){
  const scale=curScale;
  if(!scale||!scale.isParty)return;
  const fs=RAW.features;
  const byVote=[...fs].sort((a,b)=>(b.properties[scale.vField]||0)-(a.properties[scale.vField]||0));
  const byRate=scale.rField?[...fs].sort((a,b)=>(b.properties[scale.rField]||0)-(a.properties[scale.rField]||0)):null;

  // Render top7 immediately
  const t7El=document.getElementById('top7-section');
  if(t7El) t7El.innerHTML=buildTop7HTML(scale);

  // AI
  const aiEl=document.getElementById('ai-content');
  if(!aiEl)return;
  const top1v=byVote[0]?.properties;
  const top1vVal=(top1v?.[scale.vField]||0).toLocaleString();
  const top1r=byRate?byRate[0]?.properties:null;
  const top1rVal=top1r&&scale.rField?((top1r[scale.rField]||0)*100).toFixed(2)+'%':'';
  const metricDesc=scale.rField?`催票率第1名：${top1r?.village}（${top1rVal}）
`:'';

  const prompt=`你是高雄市三民區選舉地圖助手。用繁體中文寫1-2句說明，不要列名單。
選舉：${scale.label}
得票數第1名：${top1v?.village}（${top1vVal}票）
${metricDesc}請描述這次選舉在三民區的特色。`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:prompt}]})
    });
    const d=await res.json();
    const txt=d.content?.find(c=>c.type==='text')?.text||'';
    if(aiEl)aiEl.innerHTML=`<div class="ai-summary">${txt||'（分析完成）'}</div>`;
  }catch(e){
    if(aiEl)aiEl.innerHTML=`<div class="ai-summary">得票數最高：<strong>${top1v?.village}</strong>（${top1vVal}票）${top1r&&top1rVal?`，催票率最高：<strong>${top1r?.village}</strong>（${top1rVal}）`:''}。</div>`;
  }
}

// ── Village panel ──
function renderVillage(props){
  const pop26=(props['pop2026.02']||0).toLocaleString();
  const pd=props._pop_diff||0;
  const pdStr=(pd>0?'+':'')+pd.toLocaleString();
  const pdCls=pd>0?'pos':pd<0?'neg':'';

  const tsp22v=(props.tsp22||0).toLocaleString();
  const tsp22rk=props.tsp22_rk||'-';
  const tsp22t=props['tsp22_t%']?((props['tsp22_t%'])*100).toFixed(2)+'%':'-';
  const tsp22trk=props['tsp22_t%rk']||'-';

  const tot24=props._total24p||0;
  let barsHTML='';
  Object.entries(PARTIES).forEach(([k,p])=>{
    const v=props[p.fieldP]||0;if(!v)return;
    const pct=tot24>0?(v/tot24*100).toFixed(1):0;
    const w=tot24>0?(v/tot24*100):0;
    barsHTML+=`<div class="party-row">
      <div class="pname" style="color:${p.dc}">${p.name}</div>
      <div class="pbar-bg"><div class="pbar-fill" style="width:${w}%;background:${p.color}"></div></div>
      <div class="pstats">${v.toLocaleString()} <span style="opacity:0.6">(${pct}%)</span></div>
    </div>`;
  });

  return`<div class="sidebar-section">
    <button class="back-btn" onclick="goBack()">← 回上一層</button>
    <div class="info-village">${props.village||'-'}</div>
    <div class="info-area">${props.area||''} · ${props.district||''}</div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-title">👥 人口資訊</div>
    <div class="stat-row">
      <span class="stat-label">最新人口</span>
      <span class="stat-value">${pop26}<span class="rank-badge">(${props.pop26_rank||'-'}/86名)</span></span>
    </div>
    <div class="stat-row">
      <span class="stat-label">增減</span>
      <span class="stat-value ${pdCls}">${pdStr} 人<span class="rank-badge">(${props.pop_diff_rank||'-'}/86名)<br><span style="font-size:10px;font-weight:400;color:var(--muted)">與2022年相比</span></span></span>
    </div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-title">🗳️ 2022 議員選舉（台灣基進）</div>
    <div class="stat-row"><span class="stat-label">得票數</span><span class="stat-value">${tsp22v} 票<span class="rank-badge">(${tsp22rk}/86名)</span></span></div>
    <div class="stat-row"><span class="stat-label">得票率</span><span class="stat-value">（待補）</span></div>
    <div class="stat-row"><span class="stat-label">催票率</span><span class="stat-value">${tsp22t}<span class="rank-badge">(${tsp22trk}/86名)</span></span></div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-title">🗳️ 2024 各黨不分區</div>
    <div class="stat-row"><span class="stat-label">總票數</span><span class="stat-value hl">${tot24.toLocaleString()}</span></div>
    <div class="party-bar-wrap">${barsHTML}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px">※ 各候選人得票資料待補</div>
  </div>`;
}

// ── Filter controls ──
function updateAvail(){
  const ybs=document.querySelectorAll('.y-btn');
  const tbs=document.querySelectorAll('.t-btn');
  if(curParty==='all'||curParty==='pop'){
    ybs.forEach(b=>b.disabled=true);tbs.forEach(b=>b.disabled=true);return;
  }
  const p=PARTIES[curParty];
  ybs.forEach(b=>{
    const y=b.dataset.year;
    if(!y){b.disabled=true;return;}
    if(y==='2020'||y==='2018'){b.disabled=true;return;}
    if(y==='2022')b.disabled=!p.fieldC;else b.disabled=false;
  });
  tbs.forEach(b=>{
    const t=b.dataset.type;
    if(curYear==='2024'){
      if(t==='P')b.disabled=!p.fieldP;
      else if(t==='L')b.disabled=!p.fieldL;
      else b.disabled=true;
    }else if(curYear==='2022')b.disabled=(t!=='C');
    else b.disabled=true;
  });
}
function syncActive(){
  document.querySelectorAll('.y-btn').forEach(b=>b.classList.toggle('active',b.dataset.year===curYear));
  document.querySelectorAll('.t-btn').forEach(b=>b.classList.toggle('active',b.dataset.type===curType));
}
function applyUpdate(){
  curScale=getActiveScale();
  if(geojsonLayer)geojsonLayer.setStyle(styleFn);
  updateLegend(curScale);
  updateAllTooltips();
  syncActive();
  curVillageProps=null;
  renderPanel();
}
function setParty(party,btn){
  curParty=party;
  document.querySelectorAll('#row-party .fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(party!=='all'&&party!=='pop'){
    const p=PARTIES[party];
    if(!curYear)curYear='2024';
    if(curYear==='2022'&&!p.fieldC)curYear='2024';
    if(curYear==='2024'&&curType==='C')curType='P';
    if(curYear==='2024'&&curType==='L'&&!p.fieldL)curType='P';
    if(curYear==='2022')curType='C';
  }
  updateAvail();applyUpdate();
}
function setYear(year,btn){
  if(btn.disabled)return;
  curYear=year;
  if(year==='2022')curType='C';
  else if(year==='2024'){
    if(curType==='C')curType='P';
    if(curType==='L'&&!PARTIES[curParty]?.fieldL)curType='P';
  }
  updateAvail();applyUpdate();
}
function setType(type,btn){
  if(btn.disabled)return;
  curType=type;updateAvail();applyUpdate();
}
function goBack(){curVillageProps=null;renderPanel();}

// ── Chat ──
function toggleChat(){
  chatOpen=!chatOpen;
  document.getElementById('chat-msgs').style.display=chatOpen?'flex':'none';
  document.getElementById('chat-input-row').style.display=chatOpen?'flex':'none';
  document.getElementById('chat-toggle').textContent=chatOpen?'▲':'▼';
}
function appendMsg(role,text){
  const el=document.getElementById('chat-msgs');
  const d=document.createElement('div');d.className=`msg ${role}`;d.textContent=text;
  el.appendChild(d);el.scrollTop=el.scrollHeight;
}
async function sendChat(){
  if(chatLoading)return;
  const input=document.getElementById('chat-input');
  const q=input.value.trim();if(!q)return;
  input.value='';appendMsg('user',q);
  chatLoading=true;document.getElementById('chat-send').disabled=true;
  const sys=`你是高雄市三民區選舉地圖的資料查詢助手。只根據以下資料回答，用繁體中文，回答簡短精確。
欄位：v=里名,a=區域,p26=最新人口,pd=人口增減,p26rk=人口排名,pdrk=增減排名,tsp22=台灣基進2022議員得票數,tsp22rk=得票排名,tsp22t=催票率(%),tsp22trk=催票率排名,d24=民進黨2024不分區,k24=國民黨,tp24=民眾黨,tsp24=台灣基進,n24=時代力量,g24=綠黨,o24=歐巴桑,tot24=2024不分區總票數
資料：${JSON.stringify(AI_DATA)}`;
  chatHistory.push({role:'user',content:q});
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:sys,messages:chatHistory.slice(-6)})
    });
    const d=await res.json();
    const txt=d.content?.find(c=>c.type==='text')?.text||'';
    chatHistory.push({role:'assistant',content:txt});
    appendMsg('assistant',txt||'抱歉，無法取得回答。');
  }catch(e){
    chatHistory.push({role:'assistant',content:'抱歉，連線失敗。'});
    appendMsg('assistant','抱歉，連線失敗，請稍後再試。');
  }
  chatLoading=false;document.getElementById('chat-send').disabled=false;
}

// ── Locate ──
function locateUser(){
  document.getElementById('locateBtn').style.opacity='0.5';
  map.locate({setView:true,maxZoom:16});
}
map.on('locationfound',e=>{
  document.getElementById('locateBtn').style.opacity='1';
  L.circleMarker(e.latlng,{radius:8,fillColor:'#4285F4',color:'#fff',weight:2,fillOpacity:0.9}).addTo(map).bindPopup('你在這裡').openPopup();
});
map.on('locationerror',()=>{
  document.getElementById('locateBtn').style.opacity='1';
  alert('無法取得位置，請確認已允許定位權限。');
});

// ── Init ──
function onEachFeature(feature,layer){
  layer.on({
    mouseover:e=>{e.target.setStyle({weight:2.5,color:'#fff',fillOpacity:0.95});e.target.bringToFront();},
    mouseout: e=>geojsonLayer.resetStyle(e.target),
    click:    e=>{e.target.setStyle({weight:2.5,color:'#fff',fillOpacity:0.95});e.target.bringToFront();selectVillage(feature.properties);}
  });
  layer.bindTooltip('',{permanent:true,direction:'center',className:'village-label',interactive:false});
}
function selectVillage(p){curVillageProps=p;renderPanel();}

// Default: tsp 2022 C
document.querySelector('[data-party="tsp"]').classList.add('active');
document.querySelector('[data-year="2022"]').classList.add('active');
document.querySelector('[data-type="C"]').classList.add('active');

// Chat default closed
document.getElementById('chat-msgs').style.display='none';
document.getElementById('chat-input-row').style.display='none';

curScale=getActiveScale();
geojsonLayer=L.geoJSON(RAW,{style:styleFn,onEachFeature}).addTo(map);
map.fitBounds(geojsonLayer.getBounds(),{padding:[20,20]});
updateLegend(curScale);
updateAvail();
updateAllTooltips();
renderPanel();
</script>
