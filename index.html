<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>高雄三民區選舉地圖</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f1117;--panel:#1a1d27;--border:#2a2d3e;
      --accent:#4f7cff;--text:#e8eaf0;--muted:#8892aa;
      --green:#22c55e;--red:#ef4444;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Noto Sans TC',sans-serif;font-size:14px;background:var(--bg);color:var(--text);overflow:hidden;}
    body{display:flex;flex-direction:column;}

    header{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden;}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);flex-shrink:0;}
    header h1{font-size:15px;font-weight:700;}
    header .sub{font-size:11px;color:var(--muted);}

    .filter-area{background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
    .filter-row{display:flex;align-items:center;gap:5px;padding:5px 14px;overflow-x:auto;white-space:nowrap;border-bottom:1px solid var(--border);}
    .filter-row:last-child{border-bottom:none;}
    .filter-label{font-size:11px;color:var(--muted);flex-shrink:0;width:30px;}
    .fbtn{padding:4px 11px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans TC',sans-serif;font-size:12px;cursor:pointer;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
    .fbtn:hover:not(:disabled){border-color:var(--accent);color:var(--text);}
    .fbtn:disabled{opacity:0.22;cursor:not-allowed;}
    .fbtn.active{color:#fff;font-weight:500;}
    .y-btn.active,.m-btn.active{background:var(--accent);border-color:var(--accent);}
    /* election & candidate active colors set via JS */

    .main{display:flex;flex:1;overflow:hidden;min-height:0;}
    #map{flex:1;background:#151820;min-width:0;position:relative;}

    #legend-overlay{
      position:absolute;bottom:36px;right:10px;z-index:900;
      background:rgba(15,17,23,0.93);border:1px solid var(--border);
      border-radius:8px;padding:9px 12px;width:200px;
      backdrop-filter:blur(4px);pointer-events:none;
    }
    .lg-title{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .lg-bar-wrap{position:relative;margin-bottom:4px;}
    .lg-bar{height:10px;border-radius:4px;width:100%;}
    .lg-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);margin-top:2px;}
    .lg-needle{position:absolute;top:-4px;width:2px;height:18px;background:#fff;border-radius:1px;box-shadow:0 0 4px rgba(0,0,0,.8);transform:translateX(-50%);transition:left 0.3s;}
    .lg-needle-tip{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:9px;color:#fff;white-space:nowrap;background:rgba(0,0,0,.8);border-radius:3px;padding:2px 5px;font-weight:600;text-align:center;line-height:1.5;}

    .sidebar{width:38%;max-width:480px;min-width:270px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
    .sidebar-inner{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0;}
    .sidebar-section{padding:13px 15px;border-bottom:1px solid var(--border);}
    .sidebar-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;}

    .back-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:10px;padding:4px 0;border:none;background:none;transition:color 0.15s;}
    .back-btn:hover{color:var(--accent);}
    .info-placeholder{font-size:14px;color:var(--muted);line-height:1.8;}
    .info-village{font-size:22px;font-weight:700;color:var(--text);}
    .info-area{font-size:13px;color:var(--muted);margin-bottom:6px;}

    .stat-row{display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border);}
    .stat-row:last-child{border-bottom:none;}
    .stat-label{font-size:14px;color:var(--muted);flex:1;padding-top:1px;}
    .stat-val-block{text-align:right;}
    .stat-value{font-size:15px;font-weight:600;color:var(--text);}
    .stat-sub{font-size:12px;color:var(--muted);display:block;margin-top:1px;}
    .rank-badge{font-size:12px;color:var(--muted);font-weight:400;margin-left:3px;}
    .pos{color:var(--green);}.neg{color:var(--red);}

    .party-bar-wrap{margin-top:5px;}
    .party-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;cursor:pointer;border-radius:4px;padding:2px 3px;transition:background 0.12s;}
    .party-row:hover{background:rgba(255,255,255,0.05);}
    .party-row.sel{background:rgba(255,255,255,0.07);outline:1px solid rgba(255,255,255,0.15);}
    .pname{font-size:13px;width:88px;flex-shrink:0;}
    .pbar-bg{flex:1;height:9px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
    .pbar-fill{height:100%;border-radius:2px;transition:width 0.3s;}
    .pstats{font-size:12px;color:var(--muted);width:100px;text-align:right;flex-shrink:0;}

    .top-section{margin-bottom:12px;}
    .top-section:last-child{margin-bottom:0;}
    .top-section-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--border);}
    .top-item{display:flex;align-items:baseline;gap:6px;padding:3px 0;font-size:13px;}
    .top-item-interactive{cursor:pointer;border-radius:4px;padding:4px 6px;margin:0 -6px;transition:background 0.15s;}
    .top-item-interactive:hover{background:rgba(79,124,255,0.12);}
    .top-rank{font-size:12px;color:var(--accent);font-weight:700;width:32px;flex-shrink:0;}
    .top-village{flex:1;color:var(--text);}
    .top-val{font-size:11px;color:var(--muted);text-align:right;}

    .ai-summary{font-size:14px;line-height:1.8;color:var(--text);padding:4px 0 8px;}
    .ai-loading{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;padding:4px 0 8px;}
    .ai-spinner{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .stat-sm{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border);}
    .stat-sm:last-child{border-bottom:none;}
    .stat-sm .lbl{color:var(--muted);}

    .ai-chat-area{border-top:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;max-height:210px;}
    .ai-chat-header{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;flex-shrink:0;user-select:none;}
    .ai-chat-header span{font-size:12px;color:var(--muted);}
    .ai-chat-msgs{flex:1;overflow-y:auto;padding:6px 12px;display:flex;flex-direction:column;gap:5px;min-height:0;}
    .msg{font-size:12px;line-height:1.6;padding:6px 10px;border-radius:6px;max-width:92%;word-break:break-all;}
    .msg.user{background:var(--accent);color:#fff;align-self:flex-end;}
    .msg.assistant{background:#22253a;color:var(--text);align-self:flex-start;}
    .ai-chat-input-row{display:flex;gap:6px;padding:7px 12px;flex-shrink:0;border-top:1px solid var(--border);}
    .ai-input{flex:1;background:#22253a;border:1px solid var(--border);border-radius:4px;padding:5px 9px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:12px;outline:none;}
    .ai-input:focus{border-color:var(--accent);}
    .ai-send{padding:5px 11px;background:var(--accent);border:none;border-radius:4px;color:#fff;font-size:12px;cursor:pointer;flex-shrink:0;}
    .ai-send:disabled{opacity:0.4;cursor:not-allowed;}

    /* ── 熱冷區 ── */
    .cluster-section{margin-bottom:14px;}
    .cluster-header{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
    .cluster-badge{width:14px;height:14px;border-radius:3px;flex-shrink:0;}
    .cluster-title{font-size:13px;font-weight:700;color:var(--text);}
    .cluster-count{font-size:11px;color:var(--muted);}
    .cluster-row{display:flex;align-items:center;gap:4px;padding:3px 0;font-size:12px;cursor:pointer;}
    .cluster-row:hover{color:var(--accent);}
    .cluster-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .boundary-row{font-size:11px;color:var(--muted);padding:2px 0 2px 12px;border-left:2px solid var(--border);margin-top:4px;}
    /* ── Top5 icons ── */
    .top5-icon{background:transparent;border:none;}
    .top5-badge{
      background:#ffe500;color:#0f1117;font-size:10px;font-weight:900;
      border-radius:50%;width:22px;height:22px;display:flex;align-items:center;
      justify-content:center;border:2px solid #fff;
      box-shadow:0 0 0 2px #ffe500,0 2px 8px rgba(0,0,0,0.8);
      cursor:pointer;pointer-events:auto;
    }
    .bld-popup{font-family:'Noto Sans TC',sans-serif;font-size:13px;color:#1a1d27;line-height:1.6;}
    .bld-popup b{color:#4f7cff;}
    .bld-toggle{position:absolute;bottom:80px;left:10px;z-index:1000;background:rgba(22,25,43,0.93);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:5px 9px;font-size:11px;color:var(--muted);cursor:pointer;display:none;white-space:nowrap;user-select:none;}
    .bld-toggle.on{color:#ffe500;border-color:rgba(255,229,0,0.4);}
    .locate-btn{position:absolute;bottom:36px;left:10px;z-index:1000;width:32px;height:40px;background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));}
    .locate-btn:hover{filter:drop-shadow(0 2px 6px rgba(79,124,255,0.7));}
    .leaflet-container{background:#151820;}
    .leaflet-control-zoom a{background:var(--panel)!important;color:var(--text)!important;border-color:var(--border)!important;}
    .leaflet-control-attribution{background:rgba(15,17,23,0.85)!important;color:var(--muted)!important;font-size:9px!important;}
    .village-label{background:transparent!important;border:none!important;box-shadow:none!important;font-family:'Noto Sans TC',sans-serif;color:#fff;pointer-events:none;text-align:center;line-height:1.45;white-space:nowrap;text-shadow:-1px -1px 2px rgba(0,0,0,0.95),1px -1px 2px rgba(0,0,0,0.95),-1px 1px 2px rgba(0,0,0,0.95),1px 1px 2px rgba(0,0,0,0.95);}
    .village-label::before{display:none!important;}
    @keyframes fadeHint{0%{opacity:1}70%{opacity:1}100%{opacity:0;pointer-events:none}}
    .ep-row{padding:6px 4px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:4px;transition:background 0.12s;margin:0 -4px;}
    .ep-row:hover{background:rgba(79,124,255,0.1);padding:6px 8px;}
    .ep-row:last-child{border-bottom:none;}
    .ep-row-top{display:flex;align-items:baseline;gap:5px;margin-bottom:3px;}
    .ep-rank{font-size:11px;color:var(--accent);font-weight:700;flex-shrink:0;min-width:38px;}
    .ep-village{font-size:14px;font-weight:600;flex:1;color:var(--text);}
    .ep-vpop{font-size:10px;color:var(--muted);flex-shrink:0;}
    .ep-bar-wrap{height:7px;background:rgba(255,255,255,0.10);border-radius:3px;margin:3px 0 4px 43px;overflow:hidden;}
    .ep-bar-fill{height:100%;border-radius:2px;transition:width 0.4s;}
    .ep-row-bot{display:flex;gap:6px;font-size:11px;color:var(--muted);padding-left:43px;flex-wrap:wrap;}
    .ep-hi{color:var(--text);font-weight:700;}
    .ep-tab-bar{display:flex;gap:5px;margin-bottom:10px;align-items:center;}
    .ep-tab-bar .fbtn{flex:1;}
    .cand-hero{font-size:17px;font-weight:700;color:var(--text);margin:4px 0 2px;}
    .cand-total{font-size:12px;color:var(--muted);margin-bottom:8px;}
    .filter-toggle{display:none;} /* 桌面隱藏 */
    @media(max-width:640px){
      .main{flex-direction:column;flex:1;min-height:0;overflow:hidden;}
      #map{flex:none;height:40vh;width:100%;}
      .sidebar{width:100%;max-width:none;min-width:0;flex:1;min-height:0;border-left:none;border-top:1px solid var(--border);flex-direction:column;overflow:hidden;}
      .sidebar-inner{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
      .sidebar-section{min-width:unset;max-width:none;border-right:none;border-bottom:1px solid var(--border);}
      .ai-chat-area{min-width:unset;border-right:none;border-top:2px solid var(--border);flex-shrink:0;max-height:120px;}
      .locate-btn{bottom:44vh;left:8px;}
      #legend-overlay{bottom:auto;top:6px;right:6px;}
      .filter-row{padding:4px 10px;gap:4px;}
      .fbtn{padding:4px 8px;font-size:11px;}
      /* 折疊按鈕：只在手機顯示 */
      .filter-toggle{
        display:flex;align-items:center;justify-content:space-between;
        padding:5px 14px;cursor:pointer;user-select:none;
        font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);
        background:var(--panel);flex-shrink:0;
      }
      .filter-toggle:hover{color:var(--text);}
      .filter-toggle-arrow{font-size:10px;transition:transform 0.2s;}
      /* 折疊狀態：只顯示 row-year，其他隱藏 */
      .filter-area.collapsed .filter-row:not(#row-year){display:none;}
      .filter-area.collapsed .filter-toggle .filter-toggle-arrow{transform:rotate(180deg);}
      /* row-year 在折疊模式下也要顯示 */
      .filter-area.collapsed #row-year{display:flex;}
    }
  </style>
</head>
<body>
<header>
  <div class="dot"></div>
  <div><div class="sub">高雄市</div><h1>三民區選舉地圖</h1></div>
  <div style="margin-left:auto;flex-shrink:0">
    <a href="/cdn-cgi/l/email-protection#d2b3ebe3e2e4e2e4e2e192b5bfb3bbbefcb1bdbf" style="font-size:11px;color:var(--muted);text-decoration:none;white-space:nowrap;transition:color 0.15s;user-select:all" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">
      ✉ 歡迎合作 <span class="__cf_email__" data-cfemail="f495cdc5c4c2c4c2c4c7b49399959d98da979b99">[email&#160;protected]</span>
    </a>
  </div>
</header>
<div class="filter-area" id="filter-area">
  <div class="filter-toggle" onclick="toggleFilterArea()">
    <span id="filter-toggle-label">▲ 篩選條件（點擊收起）</span>
    <span class="filter-toggle-arrow" id="filter-arrow">▲</span>
  </div>
  <div class="filter-row" id="row-year">
    <span class="filter-label">年分</span>
    <button class="fbtn y-btn" data-year="2024" onclick="setYear('2024',this)">2024</button>
    <button class="fbtn y-btn" data-year="2022" onclick="setYear('2022',this)">2022</button>
    <button class="fbtn y-btn" data-year="2020" onclick="setYear('2020',this)">2020</button>
    <button class="fbtn y-btn" data-year="pop"  onclick="setYear('pop',this)">人口資訊</button>
    <button class="fbtn y-btn" data-year="overview" onclick="setYear('overview',this)">整體概況</button>
    <button class="fbtn y-btn" data-year="bld" onclick="setYear('bld',this)">管委會</button>
  </div>
  <div class="filter-row" id="row-election">
    <span class="filter-label">選舉</span>
    <!-- 動態產生 -->
  </div>
  <div class="filter-row" id="row-candidate">
    <span class="filter-label">候選人</span>
    <!-- 動態產生 -->
  </div>
  <div class="filter-row" id="row-metric">
    <span class="filter-label">數據</span>
    <button class="fbtn m-btn active" data-metric="V" onclick="setMetric('V',this)">得票數</button>
    <button class="fbtn m-btn" data-metric="R" onclick="setMetric('R',this)">得票率</button>
    <button class="fbtn m-btn" data-metric="T" onclick="setMetric('T',this)">催票率</button>
  </div>
</div>

<div class="main">
  <div id="map">
    <button id="bldToggle" class="bld-toggle" onclick="toggleBuildings()" title="顯示/隱藏建築標記">🏢 建築標記</button>
    <button id="locToggle" class="bld-toggle" style="bottom:112px;display:none" onclick="toggleLocations()" title="顯示/隱藏地點標記">📍 地點標記</button>
    <button class="locate-btn" id="locateBtn" onclick="locateUser()" title="定位我的位置">
      <svg width="24" height="36" viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 0C5.4 0 0 5.4 0 12c0 8.4 12 24 12 24S24 20.4 24 12C24 5.4 18.6 0 12 0z" fill="#4285F4"/>
        <circle cx="12" cy="12" r="5.5" fill="white"/>
        <circle cx="12" cy="12" r="3.5" fill="#4285F4"/>
      </svg>
    </button>
    <div id="legend-overlay"></div>
    <div id="map-hint" style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:900;background:rgba(15,17,23,0.75);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--muted);pointer-events:none;white-space:nowrap;backdrop-filter:blur(4px);">
      👆 點擊地圖上的里，查看選舉詳細數據
    </div>
  </div>
  <div class="sidebar">
    <div class="sidebar-inner"><div id="main-panel"></div></div>
    <div class="ai-chat-area">
      <div class="ai-chat-header" onclick="toggleChat()">
        <span>💬 詢問地圖資料</span>
        <span class="ai-chat-toggle" id="chat-toggle">▼</span>
      </div>
      <div class="ai-chat-msgs" id="chat-msgs" style="display:none"></div>
      <div class="ai-chat-input-row" id="chat-input-row" style="display:none">
        <input class="ai-input" id="chat-input" placeholder="例：哪個里得票最高？前5名催票率" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="ai-send" id="chat-send" onclick="sendChat()">送出</button>
      </div>
    </div>
  </div>
</div>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>

    candidates:[
      {key:'dpp',    name:'李昆澤', party:'民進黨', color:'#1B9431', aggKeys:['dpp']},
      {key:'kmt',    name:'黃柏霖', party:'國民黨', color:'#1a6bc1', aggKeys:['kmt']},
      {key:'obs',    name:'張芳愉', party:'歐巴桑', color:'#E91E8C', aggKeys:['obs']},
      {key:'others', name:'楊椒喬（無）',   party:'無黨籍', color:'#6b7280', aggKeys:['others']},
    ]
  },
  '2024_president': {
    label:'總統', year:'2024',

// ═══════════════════════════════════════════════════════
// 顏色工具
// ═══════════════════════════════════════════════════════
function lighten(hex,steps){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return Array.from({length:steps},(_,i)=>{
    const t=1-(i/(steps-1));
    return `rgb(${Math.round(r+(255-r)*t*0.88)},${Math.round(g+(255-g)*t*0.88)},${Math.round(b+(255-b)*t*0.88)})`;
  });
}
function getColor(scale,v){
  if(v==null)return '#2a2d3e';
  for(let i=0;i<scale.breaks.length;i++)if(v<scale.breaks[i])return scale.colors[i];
  return scale.colors[scale.colors.length-1];
}

// ═══════════════════════════════════════════════════════
// 值域計算（valueMap）
// ═══════════════════════════════════════════════════════
function computeValueMap(){
  valueMap={}; _rankCache={};
  const el=ELECTIONS[curElection];
  const cand=el?.candidates.find(c=>c.key===curCandidate);
  if(!el||!cand)return;
  const eData=EDATA_CACHE[el.file];
  if(!eData)return;
  RAW.features.forEach(f=>{
    const v=f.properties.village;
    let vRow=eData.villages[v];
    if(!vRow)return;
    if(el.dataKey)vRow=vRow[el.dataKey];
    if(!vRow)return;
    const votes=cand.aggKeys.reduce((s,k)=>s+(vRow[k]||0),0);
    const valid=vRow.valid||1;
    const vpop=vRow.vpop||1;
    valueMap[v]={V:votes,R:votes/valid,T:votes/vpop,votes,valid,vpop};
  });
}

// ═══════════════════════════════════════════════════════
// Scale
// ═══════════════════════════════════════════════════════
function buildScaleFromMap(){
  const el=ELECTIONS[curElection];
  const cand=el?.candidates.find(c=>c.key===curCandidate);
  if(!el||!cand||!Object.keys(valueMap).length)return GRAY();
  const vals=Object.values(valueMap).map(d=>d[curMetric]||0).sort((a,b)=>a-b);
  const n=vals.length; if(!n)return GRAY();
  const q=[vals[0],vals[Math.floor(n*.2)],vals[Math.floor(n*.4)],vals[Math.floor(n*.6)],vals[Math.floor(n*.8)],vals[n-1]];
  const isRate=curMetric==='R'||curMetric==='T';
  const fmt=isRate?v=>(v*100).toFixed(1)+'%':v=>v.toLocaleString()+'票';
  const colors=lighten(cand.color,6);
  const metricLabel=curMetric==='V'?'得票數':curMetric==='R'?'得票率':'催票率';
  return{isElection:true,label:`${el.label}・${cand.name}`,metricLabel,
    breaks:q.slice(1,5),colors,isRate,candColor:cand.color,fmt,gMin:q[0],gMax:q[n-1]};
}

  label:'人口增減（vs 2022）',isPop:true,popType:'diff',displayField:'_pop_diff',

};

let POP_SCALE_CUR=null;
function buildPopCurScale(){
  if(!RAW||POP_SCALE_CUR)return POP_SCALE_CUR;
  const vals=[...RAW.features.map(f=>f.properties['pop2026.02']||0)].sort((a,b)=>a-b);
  const n=vals.length;
  const q=[vals[0],vals[Math.floor(n*.2)],vals[Math.floor(n*.4)],vals[Math.floor(n*.6)],vals[Math.floor(n*.8)],vals[n-1]];
  POP_SCALE_CUR={
    label:'最新人口（2026.02）',isPop:true,popType:'cur',displayField:'pop2026.02',
    breaks:q.slice(1,5),
    colors:['#dbeafe','#93c5fd','#3b82f6','#1d4ed8','#1e3a8a','#0f172a'],
    legendColors:['#0f172a','#1e3a8a','#1d4ed8','#3b82f6','#93c5fd','#dbeafe'],
    gMin:q[0],gMax:q[n-1]
  };
  return POP_SCALE_CUR;
}
function GRAY(){return{isOverview:true,displayField:'_pop_diff',breaks:[-9999],colors:['rgba(255,255,255,0.02)']};}

function getActiveScale(){
  if(curYear==='pop')return curPopMetric==='pop'?buildPopCurScale():POP_SCALE_DIFF;
  if(curYear==='overview'||curYear==='bld')return GRAY();

}

function styleFn(f){

    return{fillColor:'rgba(255,255,255,0.02)',weight:1.5,opacity:0.85,color:'#5a7090',fillOpacity:0.08};

  else val=valueMap[v]?.[curMetric]||0;
  return{fillColor:getColor(curScale,val),weight:1,opacity:0.5,color:'#1a1d27',fillOpacity:0.88};
}

const Z_LABEL=12,Z_STATS=15;
function tooltipHTML(props){
  const z=map.getZoom();
  if(z<Z_LABEL)return '';
  const nfs=Math.max(10,Math.min(15,8+(z-10)));
  const sfs=Math.max(9,Math.min(12,7+(z-10)));
  const showStats=z>=Z_STATS;
  let lines='';
  if(showStats&&curScale&&!curScale.isOverview){
    if(curYear==='pop'){
      const d=props._pop_diff||0;
      const c=d>0?'#22c55e':d<0?'#ef4444':'#aaa';
      lines+=`<span style="display:block;font-size:${sfs}px;color:${c}">${(d>0?'+':'')+d.toLocaleString()}人</span>`;
    }else{
      const vd=valueMap[props.village];
      if(vd){
        const rkV=getElectionRank('V',props.village);
        lines+=`<span style="display:block;font-size:${sfs}px">得票數 ${vd.V.toLocaleString()}(第${rkV}名)</span>`;
        if(curMetric==='R'){const rkR=getElectionRank('R',props.village);lines+=`<span style="display:block;font-size:${sfs}px">得票率 ${(vd.R*100).toFixed(1)}%(第${rkR}名)</span>`;}
        if(curMetric==='T'){const rkT=getElectionRank('T',props.village);lines+=`<span style="display:block;font-size:${sfs}px">催票率 ${(vd.T*100).toFixed(1)}%(第${rkT}名)</span>`;}
      }
    }
  }
  return `<span style="display:block;font-size:${nfs}px;font-weight:700">${props.village||''}</span>${lines}`;
}
function updateAllTooltips(){if(!geojsonLayer)return;geojsonLayer.eachLayer(l=>l.setTooltipContent(tooltipHTML(l.feature.properties)));}

function updateLegend(scale,villageProps){
  const el=document.getElementById('legend-overlay');
  if(!scale||scale.isOverview){el.innerHTML='';return;}
  if(scale.isPop){
    if(scale.popType==='cur'){
      // 最新人口：漸層長條 + 指針
      const gMin=scale.gMin||0,gMax=scale.gMax||1;
      const grad='linear-gradient(to right,#dbeafe,#1e3a8a)';
      let needleHTML='';
      if(villageProps){
        const val=villageProps['pop2026.02']||0;
        const pct=gMax>gMin?Math.max(0,Math.min(100,(val-gMin)/(gMax-gMin)*100)):0;
        const rk=getPopRank('pop2026.02',villageProps.village,true);
        needleHTML=`<div class="lg-needle" style="left:${pct.toFixed(1)}%"><div class="lg-needle-tip">${val.toLocaleString()}<br>第${rk}名</div></div>`;
      }
      el.innerHTML=`<div class="lg-title">${scale.label}</div><div class="lg-bar-wrap"><div class="lg-bar" style="background:${grad}"></div>${needleHTML}<div class="lg-labels"><span>${gMin.toLocaleString()}</span><span>${gMax.toLocaleString()}</span></div></div>`;
    }else{
      // 人口增減：分段色帶 + 指針
      const bars=scale.legendColors.slice().reverse().map(c=>`<span style="flex:1;background:${c};height:100%;display:inline-block"></span>`).join('');
      let needleHTML='';
      if(villageProps){
        const val=villageProps._pop_diff||0;
        const mn=-300,mx=300;
        const pct=Math.max(0,Math.min(100,(val-mn)/(mx-mn)*100));
        const rk=getPopRank('_pop_diff',villageProps.village,true);
        needleHTML=`<div class="lg-needle" style="left:${pct.toFixed(1)}%"><div class="lg-needle-tip">${val>0?'+':''}${val}<br>第${rk}名</div></div>`;
      }
      el.innerHTML=`<div class="lg-title">${scale.label}</div><div class="lg-bar-wrap" style="position:relative"><div class="lg-bar" style="display:flex;overflow:hidden">${bars}</div>${needleHTML}<div class="lg-labels"><span>減少最多</span><span>增加最多</span></div></div>`;
    }
    return;
  }
  if(scale.isElection){
    const allVals=Object.values(valueMap).map(d=>d[curMetric]||0);
    if(!allVals.length){el.innerHTML='';return;}
    const gMin=Math.min(...allVals),gMax=Math.max(...allVals);
    const fmtV=v=>scale.isRate?(v*100).toFixed(1)+'%':v.toLocaleString();
    const grad=`linear-gradient(to right,rgba(255,255,255,0.15),${scale.candColor})`;
    let needleHTML='';
    if(villageProps&&valueMap[villageProps.village]){
      const val=valueMap[villageProps.village][curMetric]||0;
      const pct=gMax>gMin?Math.max(0,Math.min(100,(val-gMin)/(gMax-gMin)*100)):0;
      const rk=getElectionRank(curMetric,villageProps.village);
      needleHTML=`<div class="lg-needle" style="left:${pct.toFixed(1)}%"><div class="lg-needle-tip">${fmtV(val)}<br>第${rk}名</div></div>`;
    }
    el.innerHTML=`<div class="lg-title">${scale.label}（${scale.metricLabel}）</div><div class="lg-bar-wrap"><div class="lg-bar" style="background:${grad}"></div>${needleHTML}<div class="lg-labels"><span>${fmtV(gMin)}</span><span>${fmtV(gMax)}</span></div></div>`;
  }
}

// ═══════════════════════════════════════════════════════
// 排名
// ═══════════════════════════════════════════════════════
function getElectionRank(metric,village){
  if(!_rankCache[metric]){
    const entries=Object.entries(valueMap).map(([v,d])=>({v,val:d[metric]||0})).sort((a,b)=>b.val-a.val);
    _rankCache[metric]={};
    entries.forEach((e,i)=>_rankCache[metric][e.v]=i+1);
  }
  return _rankCache[metric][village]||'-';
}
function getPopRank(field,village,desc=true){
  const key=field+(desc?'_d':'_a');
  if(!_popRankCache[key]){
    const entries=RAW.features.map(f=>({v:f.properties.village,val:f.properties[field]??-Infinity})).filter(e=>e.val>-Infinity).sort((a,b)=>desc?b.val-a.val:a.val-b.val);
    _popRankCache[key]={};
    entries.forEach((e,i)=>_popRankCache[key][e.v]=i+1);
  }
  return _popRankCache[key][village]||'-';
}

function renderPopPanel(){
  const fs=RAW.features;
  const byPop=[...fs].sort((a,b)=>(b.properties['pop2026.02']||0)-(a.properties['pop2026.02']||0));
  const byDiff=[...fs].sort((a,b)=>(b.properties._pop_diff||0)-(a.properties._pop_diff||0));
  const row7=(arr,vfn)=>arr.slice(0,7).map((f,i)=>{
    const r=vfn(f.properties);
    return`<div class="top-item top-item-interactive"
      onmouseenter="highlightVillage('${f.properties.village}',true)"
      onmouseleave="highlightVillage('${f.properties.village}',false)"
      onclick="goToVillage('${f.properties.village}')">
      <span class="top-rank">第${i+1}名</span>
      <span class="top-village">${f.properties.village}</span>
      <span class="top-val" style="color:${r.color}">${r.val}</span>
    </div>`;
  }).join('');
  const tsPop=curPopMetric==='pop'?'background:var(--accent);border-color:var(--accent);color:#fff':'';
  const tsDiff=curPopMetric==='diff'?'background:var(--accent);border-color:var(--accent);color:#fff':'';
  const content=curPopMetric==='pop'
    ?`<div class="sidebar-section"><div class="sidebar-title">最新人口 前7里</div>`+
      row7(byPop,p=>({val:(p['pop2026.02']||0).toLocaleString()+'人',color:'var(--accent)'}))+`</div>`
    :`<div class="sidebar-section"><div class="sidebar-title">人口增減 前7里</div>`+
      row7(byDiff,p=>{const d=p._pop_diff||0;return{val:(d>0?'+':'')+d.toLocaleString()+'人',color:d>0?'#22c55e':'#ef4444'};})+'</div>';
  return`<div class="sidebar-section">
    <div class="ep-tab-bar">
      <button class="fbtn" style="${tsPop}" onclick="setPopMetric('pop')">最新人口</button>
      <button class="fbtn" style="${tsDiff}" onclick="setPopMetric('diff')">人口增減</button>
    </div>
  </div>${content}`;
}

function renderOverviewPanel(){
  // 聚合所有已載入選舉的全三民區統計
  const rows=[];
  const seenFile=new Set();
  Object.entries(ELECTIONS).forEach(([elId,elDef])=>{
    const cached=EDATA_CACHE[elDef.file];
    if(!cached)return;
    const fileKey=elId; // 每個 elId 對應一個獨立選舉
    if(seenFile.has(fileKey))return;
    seenFile.add(fileKey);
    // 全區加總
    let totVpop=0,totVoted=0,totValid=0;
    Object.values(cached.villages||{}).forEach(vr=>{
      let r=vr;
      if(elDef.dataKey&&r)r=r[elDef.dataKey];
      if(!r)return;
      totVpop+=(r.vpop||0);
      totVoted+=(r.voted||0);
      totValid+=(r.valid||0);
    });
    if(!totVpop)return;
    rows.push({
      year:elDef.year,label:elDef.label,
      vpop:totVpop,voted:totVoted,valid:totValid,
      turnout:(totVoted/totVpop*100).toFixed(1),
      validRate:(totValid/totVpop*100).toFixed(1)
    });
  });
  rows.sort((a,b)=>b.year-a.year||0);
  if(!rows.length){
    return`<div class="sidebar-section"><div class="info-placeholder">請先點選各選舉載入資料。</div></div>`;
  }
  const maxValid=Math.max(...rows.map(r=>r.valid));
  const items=rows.map((r,i)=>{
    const barW=(r.valid/maxValid*100).toFixed(1);
    return`<div style="padding:7px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">
        <span style="font-size:13px;font-weight:700;color:var(--text)">${r.year} ${r.label}</span>
        <span style="font-size:11px;color:var(--accent)">投票率 ${r.turnout}%</span>
      </div>
      <div style="height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;margin-bottom:4px">
        <div style="height:100%;width:${barW}%;background:var(--accent);border-radius:4px;opacity:0.85"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
        <span>有效票 ${r.valid.toLocaleString()}</span>
        <span>選舉人 ${r.vpop.toLocaleString()}</span>
        <span>有效票率 ${r.validRate}%</span>
      </div>
    </div>`;
  }).join('');
  return`<div class="sidebar-section">
    <div class="sidebar-title">📊 全三民區整體概況</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:8px">長條圖以有效票數為基準。需先點選各年份選舉以載入資料。</div>
    ${items}
  </div>`;
}

function setPanelTab(t){
  curPanelTab=t;

  renderPanel();
}

function renderResultPanel(){
  const el=ELECTIONS[curElection];
  if(!el||!EDATA_CACHE[el.file])return`<div class="sidebar-section"><div class="info-placeholder">資料載入中...</div></div>`;
  const eData=EDATA_CACHE[el.file];
  const villages=RAW.features.map(f=>f.properties.village);
  // 計算各候選人全區合計
  const candStats=el.candidates.filter(c=>!c.name.includes('合計')).map(c=>{
    let totV=0,totVpop=0,totValid=0;
    villages.forEach(v=>{
      let vRow=eData.villages[v];
      if(el.dataKey&&vRow)vRow=vRow[el.dataKey];
      if(!vRow)return;
      totV+=c.aggKeys.reduce((s,k)=>s+(vRow[k]||0),0);
      totVpop+=(vRow.vpop||0);
      totValid+=(vRow.valid||0);
    });
    const elected=el.elected?.includes(c.key);
    return{c,totV,totVpop,totValid,
      rate:totValid>0?totV/totValid:0,
      turnout:totVpop>0?totV/totVpop:0,
      elected};
  }).sort((a,b)=>b.totV-a.totV);
  const maxV=candStats[0]?.totV||1;
  const rows=candStats.map((s,i)=>{
    const {c,totV,totVpop,totValid,rate,turnout,elected}=s;
    const barW=(totV/maxV*100).toFixed(1);
    const elBadge=elected?`<span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;margin-right:4px;flex-shrink:0"><svg viewBox="0 0 100 100" width="16" height="16"><circle cx="50" cy="50" r="48" fill="#e53935" stroke="#b71c1c" stroke-width="3"/><text x="50" y="68" text-anchor="middle" font-size="52" font-weight="bold" fill="#fff" font-family="serif">當</text></svg></span>`:'';
    const partyLabel=c.party?`<span style="font-size:10px;color:var(--muted)">${c.party}</span>`:'';
    return`<div style="padding:7px 0;border-bottom:1px solid var(--border)">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
        <span style="font-size:11px;color:var(--accent);font-weight:700;width:20px">${i+1}</span>
        ${elBadge}
        <span style="font-size:14px;font-weight:700;color:${c.color};flex:1">${c.name}</span>
        ${partyLabel}
        <span style="font-size:13px;font-weight:700;color:var(--text)">${totV.toLocaleString()}票</span>
      </div>
      <div style="height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;margin:3px 0 3px 26px">
        <div style="height:100%;width:${barW}%;background:${c.color};border-radius:3px"></div>
      </div>
      <div style="display:flex;gap:12px;font-size:11px;color:var(--muted);padding-left:26px">
        <span>得票率 <b style="color:var(--text)">${(rate*100).toFixed(2)}%</b></span>
        <span>催票率 <b style="color:var(--text)">${(turnout*100).toFixed(2)}%</b></span>
      </div>
    </div>`;
  }).join('');
  return`<div class="sidebar-section">
    <div style="font-size:11px;color:var(--muted)">${el.year} 年</div>
    <div class="sidebar-title" style="font-size:15px;color:var(--text)">${el.label} 選舉結果</div>
  </div>

}

function renderElectionPanel(){
  const el=ELECTIONS[curElection];
  if(curCandidate==='_result')return renderResultPanel();
  const cand=el?.candidates.find(c=>c.key===curCandidate);
  if(!el||!cand)return`<div class="sidebar-section"><div class="info-placeholder">請選擇候選人</div></div>`;

  const villages=RAW.features.map(f=>f.properties.village).filter(v=>valueMap[v]);
  const byV=[...villages].sort((a,b)=>(valueMap[b].V||0)-(valueMap[a].V||0));
  // 全區合計用全部 valueMap（所有86里），不只前10名
  const allVillages=Object.keys(valueMap);
  const byR=[...villages].sort((a,b)=>(valueMap[b].R||0)-(valueMap[a].R||0));
  const byT=[...villages].sort((a,b)=>(valueMap[b].T||0)-(valueMap[a].T||0));

  // 預計算排名 map
  const rkV={},rkR={},rkT={};
  byV.forEach((v,i)=>rkV[v]=i+1);
  byR.forEach((v,i)=>rkR[v]=i+1);
  byT.forEach((v,i)=>rkT[v]=i+1);

  const sorted=curPanelTab==='V'?byV:curPanelTab==='R'?byR:byT;

  // 長條圖：以第1名為基準
  const maxForBar=curPanelTab==='V'?(valueMap[byV[0]]?.V||1):curPanelTab==='R'?(valueMap[byR[0]]?.R||1):(valueMap[byT[0]]?.T||1);
  const el_color=el?.candidates.find(c=>c.key===curCandidate)?.color||'var(--accent)';
  const rows=sorted.slice(0,10).map((v,i)=>{
    const vd=valueMap[v];
    const vpop=(vd.vpop||0).toLocaleString();
    const hiV=curPanelTab==='V'?' class="ep-hi"':'';
    const hiR=curPanelTab==='R'?' class="ep-hi"':'';
    const hiT=curPanelTab==='T'?' class="ep-hi"':'';
    const barVal=curPanelTab==='V'?(vd.V||0):curPanelTab==='R'?(vd.R||0):(vd.T||0);
    // 用平方根拉大視覺差距，讓低值里也看得出差異
    const barW=(Math.sqrt(barVal/maxForBar)*100).toFixed(1);
    return`<div class="ep-row"
      onmouseenter="highlightVillage('${v}',true)"
      onmouseleave="highlightVillage('${v}',false)"
      onclick="goToVillage('${v}')">
      <div class="ep-row-top">
        <span class="ep-rank">第${i+1}名</span>
        <span class="ep-village">${v}</span>
        <span class="ep-vpop">選舉人 ${vpop}</span>
      </div>
      <div class="ep-bar-wrap"><div class="ep-bar-fill" style="width:${barW}%;background:${el_color}"></div></div>
      <div class="ep-row-bot">
        <span${hiV}>${(vd.V||0).toLocaleString()}票(第${rkV[v]}名)</span>
        <span${hiR}>${((vd.R||0)*100).toFixed(1)}%(第${rkR[v]}名)</span>
        <span${hiT}>催${((vd.T||0)*100).toFixed(1)}%(第${rkT[v]}名)</span>
      </div>
    </div>`;
  }).join('');

  // 全區加總摘要（用全部86里）
  const totV=allVillages.reduce((s,v)=>s+(valueMap[v].V||0),0);
  const totVpop=allVillages.reduce((s,v)=>s+(valueMap[v].vpop||0),0);
  const totValid=allVillages.reduce((s,v)=>s+(valueMap[v].valid||0),0);

  const ts=(t)=>curPanelTab===t?'background:var(--accent);border-color:var(--accent);color:#fff':'';
  // 熱冷區分析（只在有資料時計算）
  const clusterHTML=curPanelTab==='C'?`<div class="sidebar-section">${renderClusterAnalysis()}</div>`:'';
  const rankRows=curPanelTab==='C'?'':rows;
  const rankSection=curPanelTab==='C'?'':`<div class="sidebar-section">
    <div class="ep-tab-bar">
      <button class="fbtn" style="${ts('V')}" onclick="setPanelTab('V')">得票數</button>
      <button class="fbtn" style="${ts('R')}" onclick="setPanelTab('R')">得票率</button>
      <button class="fbtn" style="${ts('T')}" onclick="setPanelTab('T')">催票率</button>
      <!-- 熱冷區暫時停用 -->
      <span style="font-size:11px;color:var(--muted);margin-left:3px">前10名</span>
    </div>
    ${rankRows}
  </div>`;
  return`<div class="sidebar-section">
    <div style="font-size:11px;color:var(--muted);margin-bottom:2px">${el.year} 年・${el.label}</div>
    <div style="font-size:22px;font-weight:700;color:${cand.color};line-height:1.2;margin-bottom:1px">${cand.name}</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${cand.party||''}</div>
    <div style="display:flex;gap:6px">
      <div style="flex:1;background:rgba(255,255,255,0.05);border-radius:6px;padding:8px 6px;text-align:center">
        <div style="font-size:20px;font-weight:700;color:var(--text)">${totV.toLocaleString()}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">全區總票</div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,0.05);border-radius:6px;padding:8px 6px;text-align:center">
        <div style="font-size:20px;font-weight:700;color:var(--text)">${(totV/totValid*100).toFixed(1)}%</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">得票率</div>
      </div>
      <div style="flex:1;background:rgba(255,255,255,0.05);border-radius:6px;padding:8px 6px;text-align:center">
        <div style="font-size:20px;font-weight:700;color:var(--text)">${(totV/totVpop*100).toFixed(1)}%</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">催票率</div>
      </div>
    </div>
  </div>
  <div class="sidebar-section">
    <div class="ep-tab-bar">
      <button class="fbtn" style="${ts('V')}" onclick="setPanelTab('V')">得票數</button>
      <button class="fbtn" style="${ts('R')}" onclick="setPanelTab('R')">得票率</button>
      <button class="fbtn" style="${ts('T')}" onclick="setPanelTab('T')">催票率</button>
      <!-- 熱冷區暫時停用 -->
    </div>
    ${rankRows}
  </div>
  ${clusterHTML}`;
}

function renderVillage(props){
  const village=props.village;
  const pop26=(props['pop2026.02']||0).toLocaleString();
  const pd=props._pop_diff||0;
  const pdStr=(pd>0?'+':'')+pd.toLocaleString();
  const pdCls=pd>0?'pos':pd<0?'neg':'';
  const pop26rk=getPopRank('pop2026.02',village,true);
  const pdrk=getPopRank('_pop_diff',village,true);

  let elHTML='';
  if(curYear!=='pop'){
    const el=ELECTIONS[curElection];
    const eData=el?EDATA_CACHE[el.file]:null;
    if(el&&eData){
      let vRow=eData.villages[village];
      if(el.dataKey&&vRow)vRow=vRow[el.dataKey];
      if(vRow){
        const valid=vRow.valid||1;
        const vpop=vRow.vpop||1;
        const selCand=el.candidates.find(c=>c.key===curCandidate);
        const selVotes=selCand?selCand.aggKeys.reduce((s,k)=>s+(vRow[k]||0),0):0;
        const rkV=getElectionRank('V',village);
        const rkR=getElectionRank('R',village);
        const rkT=getElectionRank('T',village);

        // 個別候選人：顯示全區總票 + 名次
        const isIndividual=selCand&&!selCand.name.includes('合計');
        let candHeroHTML='';
        if(isIndividual){
          const totV=Object.values(valueMap).reduce((s,d)=>s+(d.V||0),0);
          const totVpop=Object.values(valueMap).reduce((s,d)=>s+(d.vpop||0),0);
          const totValid=Object.values(valueMap).reduce((s,d)=>s+(d.valid||0),0);
          candHeroHTML=`<div style="margin-bottom:8px;padding:7px 10px;background:rgba(255,255,255,0.04);border-radius:6px;border-left:3px solid ${selCand.color};display:flex;align-items:center;justify-content:space-between">

          </div>`;
        }

        // 候選人得票由多到少排序

        const candWithVotes=el.candidates
          .filter(c=>!isIndividual||!c.name.includes('合計'))
          .map(c=>({c,v2:c.aggKeys.reduce((s,k)=>s+(vRow[k]||0),0)}))
          .sort((a,b)=>b.v2-a.v2);
        const maxV2=candWithVotes[0]?.v2||1;
        const bars=candWithVotes.map(({c,v2},rank)=>{
          const pct=(v2/valid*100).toFixed(1);
          const barW=(Math.sqrt(v2/maxV2)*100).toFixed(1); // sqrt scale 拉大視覺差距
          const isSel=c.key===curCandidate;
          const isElected2=el.elected?.includes(c.key);
          return`<div class="party-row${isSel?' sel':''}" onclick="setCandidate('${c.key}')" style="${isSel?'outline:2px solid '+c.color+';outline-offset:2px;border-radius:5px':''}">
            <div style="font-size:10px;color:var(--accent);width:22px;flex-shrink:0;font-weight:700">${rank+1}</div>
            ${isElected2?'<span style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;flex-shrink:0" title="當選"><svg viewBox="0 0 100 100" width="14" height="14"><circle cx="50" cy="50" r="48" fill="#e53935" stroke="#b71c1c" stroke-width="3"/><text x="50" y="68" text-anchor="middle" font-size="52" font-weight="bold" fill="#fff" font-family="serif">當</text></svg></span>':'<span style="width:16px;flex-shrink:0"></span>'}
            <div class="pname" style="color:${isSel?c.color:'var(--text)'};font-weight:${isSel?'700':'400'}">${c.name}</div>

            <div class="pstats">${v2.toLocaleString()} <span style="opacity:0.6">(${pct}%)</span></div>
          </div>`;
        }).join('');
        elHTML=`<div class="sidebar-section">
          <div class="sidebar-title">🗳️ ${el.label}</div>
          ${candHeroHTML}
          <div style="display:flex;gap:4px;margin:6px 0">
            <div style="flex:1;text-align:center;background:rgba(255,255,255,0.06);border-radius:6px;padding:7px 2px">

              <div style="font-size:10px;color:var(--muted);margin-top:1px">得票數</div>
              <div style="font-size:11px;color:var(--accent)">第${rkV}名</div>
            </div>
            <div style="flex:1;text-align:center;background:rgba(255,255,255,0.06);border-radius:6px;padding:7px 2px">
              <div style="font-size:17px;font-weight:700;color:var(--text)">${(selVotes/valid*100).toFixed(1)}%</div>
              <div style="font-size:10px;color:var(--muted);margin-top:1px">得票率</div>
              <div style="font-size:11px;color:var(--accent)">第${rkR}名</div>
            </div>
            <div style="flex:1;text-align:center;background:rgba(255,255,255,0.06);border-radius:6px;padding:7px 2px">
              <div style="font-size:17px;font-weight:700;color:var(--text)">${(selVotes/vpop*100).toFixed(1)}%</div>
              <div style="font-size:10px;color:var(--muted);margin-top:1px">催票率</div>
              <div style="font-size:11px;color:var(--accent)">第${rkT}名</div>
            </div>
          </div>

          <div class="sidebar-title">本里完整得票（點擊切換）</div>

        </div>`;
      }
    }
  }

  // 歷次投票概況（遍歷所有 EDATA_CACHE，去除重複選舉）
  let histHTML='';
  const histRows=[];
  const seenElId=new Set();
  Object.entries(ELECTIONS).forEach(([elId,elDef])=>{
    const cached=EDATA_CACHE[elDef.file];
    if(!cached)return;
    // 同一 file 可能有 P/L 兩個選舉，用 elId 做 key
    let vRow=cached.villages?.[village];
    if(!vRow)return;
    if(elDef.dataKey)vRow=vRow[elDef.dataKey];
    if(!vRow||!vRow.vpop||!vRow.valid)return;
    const turnoutRate=vRow.voted?(vRow.voted/vRow.vpop*100).toFixed(1):'－';
    // 用主要候選人計算催票率

    const mainVotes=mainCand?mainCand.aggKeys.reduce((s,k)=>s+(vRow[k]||0),0):0;

    });

  if(histRows.length){
    const maxValid=Math.max(...histRows.map(r=>r.valid));

        </div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
          <span>有效票 ${r.valid.toLocaleString()} ／ 選舉人 ${r.vpop.toLocaleString()}</span>
          <span>${r.mainCandName} 催 ${r.mainTurnout}%</span>
        </div>
      </div>`;
    }).join('');
    histHTML=`<div class="sidebar-section">
      <div class="sidebar-title">📊 歷次投票概況</div>
      ${histItems}
    </div>`;
  }

  // 里名右側顯示：該里本次選舉有效票
  let heroRightHTML='';
  if(curYear!=='pop'&&curCandidate!=='_result'){
    const el4hdr=ELECTIONS[curElection];
    const eData4hdr=el4hdr?EDATA_CACHE[el4hdr.file]:null;
    if(eData4hdr){
      let vRow4hdr=eData4hdr.villages?.[village];
      if(el4hdr.dataKey&&vRow4hdr)vRow4hdr=vRow4hdr[el4hdr.dataKey];
      if(vRow4hdr?.valid){
        heroRightHTML=`<div style="text-align:right;flex-shrink:0;padding-left:8px">
          <div style="font-size:16px;font-weight:700;color:var(--text)">${vRow4hdr.valid.toLocaleString()}</div>
          <div style="font-size:10px;color:var(--muted)">有效票</div>
          <div style="font-size:10px;color:var(--muted)">${vRow4hdr.vpop?.toLocaleString()||''}選舉人</div>
        </div>`;
      }
    }
  }
  // 選舉人數（從當前選舉資料取）
  let elVpopHTML='';
  if(curYear!=='pop'&&curCandidate!=='_result'){
    const el4v=ELECTIONS[curElection];
    const eData4v=el4v?EDATA_CACHE[el4v.file]:null;
    if(eData4v){
      let vRow4v=eData4v.villages?.[village];
      if(el4v.dataKey&&vRow4v)vRow4v=vRow4v[el4v.dataKey];
      if(vRow4v?.vpop){
        elVpopHTML=`<div style="background:rgba(79,124,255,0.08);border:1px solid rgba(79,124,255,0.2);border-radius:6px;padding:7px 10px;margin-bottom:8px">
          <div style="font-size:10px;color:var(--accent);font-weight:600;margin-bottom:4px;letter-spacing:.05em">📋 ${el4v.year}年 ${el4v.label} 選舉資訊</div>

// 篩選狀態
const bldFilter={
  floor: new Set(['5樓以下','6-15樓','15樓以上']),
  unit:  new Set(['50戶以下','51-100戶','101-250戶','250戶以上']),
  year:  new Set(['2022年以前','2022年以後']),
};
let bldGeoCache={};  // 地址 → {lat,lng}
let bldGeoPending=false;

function floorCat(f){
  if(f<=5)return '5樓以下';
  if(f<=15)return '6-15樓';
  return '15樓以上';
}
function unitCat(u){
  if(u<=50)return '50戶以下';
  if(u<=100)return '51-100戶';
  if(u<=250)return '101-250戶';
  return '250戶以上';
}
function yearCat(y){
  return y>0&&y<=2022?'2022年以前':'2022年以後';
}
function bldColor(b){
  const f=b.floors;
  if(f<=5)return '#f97316';    // 橘：低樓層
  if(f<=15)return '#3b82f6';   // 藍：中樓層
  return '#a855f7';             // 紫：高樓層
}

async function geocodeAddr(addr){
  if(bldGeoCache[addr])return bldGeoCache[addr];
  const q=encodeURIComponent(addr+' 台灣');
  const url=`https://nominatim.openstreetmap.org/search?q=${q}&format=json&limit=1&viewbox=120.27,22.74,120.39,22.62&bounded=0`;
  try{
    const r=await fetch(url,{headers:{'User-Agent':'sanmin-election-map/2.0'}});
    const d=await r.json();
    if(d&&d[0]){
      const pos={lat:parseFloat(d[0].lat),lng:parseFloat(d[0].lon)};
      bldGeoCache[addr]=pos;
      return pos;
    }
  }catch(e){}
  return null;
}

function filterBuildings(){
  return BUILDINGS_RAW.filter(b=>{
    const fc=floorCat(b.floors), uc=unitCat(b.units), yc=yearCat(b.year);
    return bldFilter.floor.has(fc)&&bldFilter.unit.has(uc)&&bldFilter.year.has(yc);
  });
}

function renderBuildingLayer(){
  if(buildingLayer){map.removeLayer(buildingLayer);buildingLayer=null;}
  if(!buildingsVisible)return;
  const filtered=filterBuildings();
  if(!filtered.length)return;
  buildingLayer=L.layerGroup();
  filtered.forEach(b=>{
    if(b.lat&&b.lng) addBldMarker(b,b.lat,b.lng);
  });
  buildingLayer.addTo(map);
  updateBldToggle();
}

function addBldMarker(b,lat,lng){
  if(!buildingLayer)return;
  const color=bldColor(b);
  const m=L.circleMarker([lat,lng],{
    radius:7,fillColor:color,color:'#fff',weight:1.5,fillOpacity:0.9,
    pane:'markerPane',   // 高於里塊的 overlayPane（z-index 600 > 400）
    interactive:true,bubblingMouseEvents:false
  });
  const fc=floorCat(b.floors),uc=unitCat(b.units),yc=yearCat(b.year);
  m.on('click',()=>{
    selectedBuilding=b;
    const panelEl=document.getElementById('main-panel');
    if(panelEl) panelEl.innerHTML=renderBldPanel();
  });
  buildingLayer.addLayer(m);
}

function updateBldToggle(){
  const btn=document.getElementById('bldToggle');
  const cnt=filterBuildings().length;
  if(btn){
    btn.style.display='block'; // 永遠顯示
    btn.textContent=`🏢 ${cnt}棟`;
    btn.classList.toggle('on',buildingsVisible);
  }
}

function toggleBuildings(){
  buildingsVisible=!buildingsVisible;
  if(buildingLayer){if(buildingsVisible)buildingLayer.addTo(map);else map.removeLayer(buildingLayer);}
  updateBldToggle();
  if(buildingsVisible&&!buildingLayer)renderBuildingLayer();
}

function toggleBldFilter(type,val){
  // 切換：有→移除，無→加入（允許全部取消 = 全部隱藏）
  if(bldFilter[type].has(val)) bldFilter[type].delete(val);
  else bldFilter[type].add(val);
  renderBuildingLayer();
  updateBldToggle();
  // 重新渲染面板
  const panelEl=document.getElementById('main-panel');
  if(panelEl&&curYear==='bld') panelEl.innerHTML=renderBldPanel();
}

function renderBldPanel(){
  const filtered=filterBuildings();
  const total=BUILDINGS_RAW.length;
  const floorColor={'5樓以下':'#f97316','6-15樓':'#3b82f6','15樓以上':'#a855f7'};

  const mkGroup=(type,opts,colors)=>opts.map(v=>{
    const on=bldFilter[type].has(v);
    const color=colors?colors[v]:'var(--accent)';
    const bg=on?color:'rgba(255,255,255,0.04)';
    const bdr=on?color:'var(--border)';
    const txt=on?'#fff':'var(--muted)';
    const dot=colors?`<span style="width:8px;height:8px;border-radius:50%;background:${color};margin-right:4px;display:inline-block;vertical-align:middle;flex-shrink:0"></span>`:'';
    return`<button onclick="toggleBldFilter('${type}','${v}')"
      style="padding:4px 10px;border-radius:5px;border:1px solid ${bdr};background:${bg};color:${txt};
             font-size:12px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;
             margin:2px;font-family:inherit">${dot}${v}</button>`;
  }).join('');

  // 選中建物詳細資訊
  let bldDetailHTML='';
  if(selectedBuilding){
    const b=selectedBuilding;
    const color=bldColor(b);
    const fc=floorCat(b.floors),uc=unitCat(b.units),yc=yearCat(b.year);
    bldDetailHTML=`<div class="sidebar-section">
      <button class="back-btn" onclick="selectedBuilding=null;renderPanel()">← 回篩選</button>
      <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px">${b.name}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${b.addr}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        <span style="background:${color};color:#fff;padding:3px 10px;border-radius:8px;font-size:12px">${fc}</span>
        <span style="background:rgba(255,255,255,0.08);color:var(--text);padding:3px 10px;border-radius:8px;font-size:12px">${uc}</span>
        <span style="background:rgba(255,229,0,0.15);color:#ffe500;padding:3px 10px;border-radius:8px;font-size:12px">${yc}</span>
      </div>
      <div class="stat-row"><span class="stat-label">樓層數</span><span class="stat-value">${b.floors} 樓</span></div>
      <div class="stat-row"><span class="stat-label">總戶數</span><span class="stat-value">${b.units} 戶</span></div>
      <div class="stat-row"><span class="stat-label">管委會備查年份</span><span class="stat-value">${b.year} 年</span></div>
    </div>`;
    return bldDetailHTML;

const villageLayerMap={};
function selectVillage(name){
  if(selectedVillage&&villageLayerMap[selectedVillage])geojsonLayer.resetStyle(villageLayerMap[selectedVillage]);
  selectedVillage=name;
  if(name&&villageLayerMap[name]){
    villageLayerMap[name].setStyle({weight:4,color:'#ffe500',fillOpacity:0.95,opacity:1});
    villageLayerMap[name].bringToFront();
  }
}
function highlightVillage(name,on){
  if(on){
    if(hoveredVillage&&hoveredVillage!==selectedVillage&&villageLayerMap[hoveredVillage])geojsonLayer.resetStyle(villageLayerMap[hoveredVillage]);
    hoveredVillage=name;
    if(name&&villageLayerMap[name]&&name!==selectedVillage){villageLayerMap[name].setStyle({weight:4,color:'#ffe500',fillOpacity:0.95,opacity:1});villageLayerMap[name].bringToFront();}
  }else{
    if(name!==selectedVillage&&villageLayerMap[name])geojsonLayer.resetStyle(villageLayerMap[name]);
    if(hoveredVillage===name)hoveredVillage=null;
  }
}
async function goToVillage(name){
  const f=RAW.features.find(f=>f.properties.village===name);
  if(!f)return;
  curVillageProps=f.properties;
  selectVillage(name);
  renderPanel(); // 先顯示目前資料
  const layer=villageLayerMap[name];
  if(layer)map.fitBounds(layer.getBounds(),{maxZoom:16,padding:[40,40]});
  // 背景預載所有選舉 JSON（讓歷次投票概況完整顯示）
  const allFiles=[...new Set(Object.values(ELECTIONS).map(e=>e.file))];
  const pending=allFiles.filter(f=>!EDATA_CACHE[f]);
  if(pending.length){
    await Promise.all(pending.map(async file=>{
      try{const res=await fetch(file);if(res.ok)EDATA_CACHE[file]=await res.json();}catch(e){}
    }));
    // 重新渲染以顯示完整歷史資料
    if(curVillageProps&&curVillageProps.village===name) renderPanel();
  }
}

function renderCandidateRow(candidates){
  const row=document.getElementById('row-candidate');
  const el=ELECTIONS[curElection];
  // 最左邊加「選舉結果」總覽按鈕
  const isResult=curCandidate==='_result';
  const resultBtn=`<button class="fbtn c-btn" data-key="_result" data-color="var(--accent)" data-dc="var(--accent)"
    style="${isResult?'background:var(--accent);border-color:var(--accent);color:#fff':'color:var(--accent)'}"
    onclick="setCandidate('_result',this)">選舉結果</button>`;
  // 過濾規則：若有個別候選人時才隱藏「合計」；「無黨籍合計」永遠顯示
  const hasIndividuals=candidates.some(c=>!c.name.includes('合計'));
  const btns=candidates.filter(c=>{
    if(c.key==='ind')return true; // 無黨籍合計永遠顯示
    if(c.name.includes('合計')&&hasIndividuals&&candidates.length>6)return true; // 合計保留
    return true; // 全部顯示，讓使用者自行選
  }).map(c=>{
    const isActive=c.key===curCandidate;
    // 簡稱：有 party 用 party 縮寫，否則從 key 取
    const partyKey=c.party?Object.entries({民進黨:'dpp',國民黨:'kmt',民眾黨:'tpp',時代力量:'npp',台灣基進:'tsp',綠黨:'gp',歐巴桑:'obs',無黨籍:'ind'}||{}).find(([k,v])=>c.party.includes(k))?.[1]||c.key:c.key;
    const short=PARTY_SHORT[partyKey]||PARTY_SHORT[c.key]||'';
    const label=c.party?`${c.name}${short?'('+short+')':''}`:c.name;
    const style=isActive?`background:${c.color};border-color:${c.color};color:${c.color==='#FBBE01'?'#0f1117':'#fff'}`:`color:${c.color}`;
    return`<button class="fbtn c-btn" data-key="${c.key}" data-color="${c.color}"
      style="${style}" onclick="setCandidate('${c.key}',this)">${label}</button>`;
  }).join('');
  row.innerHTML=`<span class="filter-label">候選人</span>${resultBtn}${btns}`;
}

function localQuery(q){
  const el=ELECTIONS[curElection];
  const cand=el?.candidates.find(c=>c.key===curCandidate);
  const candName=cand?.name||'';
  const elLabel=el?.label||'';
  const villages=Object.keys(valueMap);
  if(!villages.length) return '請先選擇選舉與候選人。';

  const byV=[...villages].sort((a,b)=>valueMap[b].V-valueMap[a].V);
  const byR=[...villages].sort((a,b)=>valueMap[b].R-valueMap[a].R);
  const byT=[...villages].sort((a,b)=>valueMap[b].T-valueMap[a].T);
  const totV=villages.reduce((s,v)=>s+valueMap[v].V,0);
  const totVpop=villages.reduce((s,v)=>s+valueMap[v].vpop,0);
  const totValid=villages.reduce((s,v)=>s+valueMap[v].valid,0);

  const Q=q.toLowerCase();

  // 最高/第一
  if(Q.match(/最高|第一|最多|冠軍|第1/)){
    if(Q.match(/催票/)) return `${elLabel}・${candName} 催票率最高：${byT[0]}（${(valueMap[byT[0]].T*100).toFixed(2)}%）`;
    if(Q.match(/得票率|比例/)) return `${elLabel}・${candName} 得票率最高：${byR[0]}（${(valueMap[byR[0]].R*100).toFixed(2)}%）`;
    return `${elLabel}・${candName} 得票數最高：${byV[0]}（${valueMap[byV[0]].V.toLocaleString()}票）`;
  }
  // 最低/最差
  if(Q.match(/最低|最少|最後|墊底/)){
    if(Q.match(/催票/)) return `${elLabel}・${candName} 催票率最低：${byT[byT.length-1]}（${(valueMap[byT[byT.length-1]].T*100).toFixed(2)}%）`;
    if(Q.match(/得票率/)) return `${elLabel}・${candName} 得票率最低：${byR[byR.length-1]}（${(valueMap[byR[byR.length-1]].R*100).toFixed(2)}%）`;
    return `${elLabel}・${candName} 得票數最低：${byV[byV.length-1]}（${valueMap[byV[byV.length-1]].V.toLocaleString()}票）`;
  }
  // 前N名
  const topMatch=Q.match(/前(\d+)/);
  if(topMatch){
    const n=Math.min(+topMatch[1],10);
    if(Q.match(/催票/)) return `催票率前${n}名：`+byT.slice(0,n).map((v,i)=>`${i+1}.${v}(${(valueMap[v].T*100).toFixed(1)}%)`).join('、');
    if(Q.match(/得票率/)) return `得票率前${n}名：`+byR.slice(0,n).map((v,i)=>`${i+1}.${v}(${(valueMap[v].R*100).toFixed(1)}%)`).join('、');
    return `得票數前${n}名：`+byV.slice(0,n).map((v,i)=>`${i+1}.${v}(${valueMap[v].V.toLocaleString()}票)`).join('、');
  }
  // 特定里查詢
  const villageMatch=RAW.features.find(f=>q.includes(f.properties.village));
  if(villageMatch){
    const v=villageMatch.properties.village;
    const vd=valueMap[v];
    if(!vd) return `${v} 目前沒有資料。`;
    const rkV=byV.indexOf(v)+1;
    const rkR=byR.indexOf(v)+1;
    const rkT=byT.indexOf(v)+1;
    return `${v}・${candName}：得票 ${vd.V.toLocaleString()}票（第${rkV}名）、得票率 ${(vd.R*100).toFixed(2)}%（第${rkR}名）、催票率 ${(vd.T*100).toFixed(2)}%（第${rkT}名）`;
  }
  // 總計
  if(Q.match(/總計|合計|全區|總票/)){
    return `${elLabel}・${candName} 全區合計 ${totV.toLocaleString()}票、得票率 ${(totV/totValid*100).toFixed(2)}%、催票率 ${(totV/totVpop*100).toFixed(2)}%`;
  }
  // 人口
  if(Q.match(/人口|選舉人/)){
    const sorted=[...RAW.features].sort((a,b)=>(b.properties['pop2026.02']||0)-(a.properties['pop2026.02']||0));
    return `人口最多的里：${sorted.slice(0,3).map(f=>`${f.properties.village}(${(f.properties['pop2026.02']||0).toLocaleString()}人)`).join('、')}`;
  }
  // 預設回覆
  return `目前顯示：${elLabel}・${candName}。
可以問：「哪個里得票最高」「前5名催票率」「鼎泰里的數據」「全區合計」等。`;
}

// ═══════════════════════════════════════════════════════
// 地址/地點標記圖層
// ═══════════════════════════════════════════════════════
let locationLayer=null;
let locationsVisible=true;

// ═══════════════════════════════════════════════════════
// 熱冷區空間分析
// ═══════════════════════════════════════════════════════
let _adjacency=null;
let clusterLayer=null;

function buildAdjacency(){
  if(_adjacency)return _adjacency;
  _adjacency={};
  RAW.features.forEach(f=>{_adjacency[f.properties.village]=new Set();});
  const getCoords=f=>{
    const g=f.geometry;
    if(g.type==='Polygon')return g.coordinates[0];
    if(g.type==='MultiPolygon')return g.coordinates.flat(2);
    return [];
  };
  const features=RAW.features;
  for(let i=0;i<features.length;i++){
    const c1=new Set(getCoords(features[i]).map(c=>c[0].toFixed(6)+','+c[1].toFixed(6)));
    for(let j=i+1;j<features.length;j++){
      const c2=getCoords(features[j]);
      let shared=0;
      for(const pt of c2){
        if(c1.has(pt[0].toFixed(6)+','+pt[1].toFixed(6))){
          shared++;
          if(shared>=2){
            const v1=features[i].properties.village;
            const v2=features[j].properties.village;
            _adjacency[v1].add(v2);
            _adjacency[v2].add(v1);
            break;
          }
        }
      }
    }
  }
  return _adjacency;
}

function findClusters(villageSet){
  const adj=buildAdjacency();
  const visited=new Set();
  const clusters=[];
  villageSet.forEach(v=>{
    if(visited.has(v))return;
    const cluster=[];
    const queue=[v];
    while(queue.length){
      const cur=queue.shift();
      if(visited.has(cur))return;
      visited.add(cur);
      if(!villageSet.has(cur))return;
      cluster.push(cur);
      (adj[cur]||new Set()).forEach(nb=>{
        if(!visited.has(nb)&&villageSet.has(nb))queue.push(nb);
      });
    }
    if(cluster.length>0)clusters.push(cluster);
  });
  return clusters.sort((a,b)=>b.length-a.length);
}

function renderClusterAnalysis(){
  if(curYear==='pop'||!Object.keys(valueMap).length)
    return`<div class="info-placeholder">請先選擇選舉與候選人。</div>`;

  const villages=Object.keys(valueMap);
  const n=villages.length;
  const sorted=[...villages].sort((a,b)=>(valueMap[b].V||0)-(valueMap[a].V||0));

  // 熱冷區依當前「數據」指標（R=得票率 T=催票率，不用絕對票數）
  const clusterMetric=(curMetric==='T')?'T':'R';
  const sortedCluster=[...villages].sort((a,b)=>(valueMap[b][clusterMetric]||0)-(valueMap[a][clusterMetric]||0));
  const hotN=Math.max(3,Math.floor(n*0.25));
  const coldN=Math.max(3,Math.floor(n*0.25));
  const hotSet=new Set(sortedCluster.slice(0,hotN));
  const coldSet=new Set(sortedCluster.slice(n-coldN));
  const metricLabel=clusterMetric==='T'?'催票率':'得票率';

  const adj=buildAdjacency();
  const hotClusters=findClusters(hotSet);
  const coldClusters=findClusters(coldSet);

  // 找邊界里（熱冷交界）
  const getBoundary=(clusterVillages,oppositeSet)=>{
    return clusterVillages.filter(v=>{
      return [...(adj[v]||[])].some(nb=>oppositeSet.has(nb));
    });
  };

  // 地圖疊加層
  if(clusterLayer){map.removeLayer(clusterLayer);clusterLayer=null;}
  clusterLayer=L.layerGroup();
  const hotColors=['#ef4444','#f97316','#eab308'];
  const coldColors=['#3b82f6','#06b6d4','#8b5cf6'];
  hotClusters.slice(0,3).forEach((cluster,ci)=>{
    const geoms=RAW.features.filter(f=>cluster.includes(f.properties.village));
    L.geoJSON({type:'FeatureCollection',features:geoms},{
      style:{fillColor:hotColors[ci],weight:2,color:hotColors[ci],opacity:0.7,fillOpacity:0.25,dashArray:null}
    }).addTo(clusterLayer);
  });
  coldClusters.slice(0,3).forEach((cluster,ci)=>{
    const geoms=RAW.features.filter(f=>cluster.includes(f.properties.village));
    L.geoJSON({type:'FeatureCollection',features:geoms},{
      style:{fillColor:coldColors[ci],weight:2,color:coldColors[ci],opacity:0.7,fillOpacity:0.25,dashArray:null}
    }).addTo(clusterLayer);
  });
  clusterLayer.addTo(map);

  const el=ELECTIONS[curElection];
  const cand=el?.candidates.find(c=>c.key===curCandidate);

  const mkClusterSection=(clusters,colors,label)=>clusters.slice(0,3).map((cluster,ci)=>{
    const totV=cluster.reduce((s,v)=>s+(valueMap[v]?.V||0),0);
    const boundary=getBoundary(cluster,ci===0?coldSet:hotSet);
    const rows=cluster.map(v=>{
      const rkV=sorted.indexOf(v)+1;
      return`<div class="cluster-row" onclick="goToVillage('${v}')" onmouseenter="highlightVillage('${v}',true)" onmouseleave="highlightVillage('${v}',false)">
        <div class="cluster-dot" style="background:${colors[ci]}"></div>
        <span style="flex:1">${v}</span>
        <span style="color:var(--muted);font-size:11px">${(valueMap[v]?.V||0).toLocaleString()}票 第${rkV}名</span>
      </div>`;
    }).join('');
    const boundaryHTML=boundary.length?`<div class="boundary-row">⚡交界里：${boundary.join('、')}</div>`:'';
    return`<div class="cluster-section">
      <div class="cluster-header">
        <div class="cluster-badge" style="background:${colors[ci]}"></div>
        <span class="cluster-title">${label} 第${ci+1}群（${cluster.length}里）</span>
        <span class="cluster-count">${totV.toLocaleString()}票</span>
      </div>
      ${rows}
      ${boundaryHTML}
    </div>`;
  }).join('');

  return`<div style="margin-bottom:10px;font-size:12px;color:var(--muted);line-height:1.7;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:6px">
    定義：<b style="color:#ef4444">熱區</b> = ${metricLabel}前25%里（共${hotN}里），<b style="color:#3b82f6">冷區</b> = 後25%里（共${coldN}里）。<br>
    相連的同類里合併為一群，⚡交界里代表熱冷相鄰的邊界。
  </div>
  <div style="font-size:13px;font-weight:700;color:#ef4444;margin-bottom:8px">🔴 熱區（高票聚落）</div>
  ${mkClusterSection(hotClusters,hotColors,'熱區')}
  <div style="font-size:13px;font-weight:700;color:#3b82f6;margin-bottom:8px;margin-top:14px">🔵 冷區（低票聚落）</div>
  ${mkClusterSection(coldClusters,coldColors,'冷區')}`;
}
let top5Layer=null;

function updateTop5Icons(){
  if(top5Layer){map.removeLayer(top5Layer);top5Layer=null;}
  if(curYear==='pop'||!Object.keys(valueMap).length)return;
  const villages=Object.keys(valueMap);
  const sorted=[...villages].sort((a,b)=>(valueMap[b][curMetric]||0)-(valueMap[a][curMetric]||0));
  const top5=sorted.slice(0,5);
  top5Layer=L.layerGroup();
  top5.forEach((v,i)=>{
    const feature=RAW.features.find(f=>f.properties.village===v);
    if(!feature)return;
    // 計算里的中心點
    const coords=feature.geometry.type==='Polygon'
      ?feature.geometry.coordinates[0]
      :feature.geometry.coordinates[0][0];
    const lats=coords.map(c=>c[1]),lngs=coords.map(c=>c[0]);
    const lat=lats.reduce((s,v)=>s+v,0)/lats.length;
    const lng=lngs.reduce((s,v)=>s+v,0)/lngs.length;
    const icon=L.divIcon({
      className:'top5-icon',
      html:`<div class="top5-badge">${i+1}</div>`,
      iconSize:[22,22],iconAnchor:[11,11]
    });
    const marker=L.marker([lat,lng],{icon,zIndexOffset:9999,pane:'tooltipPane'});
    const val=valueMap[v];
    const metricLabel=curMetric==='V'?`${(val.V||0).toLocaleString()}票`:curMetric==='R'?`${((val.R||0)*100).toFixed(1)}%`:`催${((val.T||0)*100).toFixed(1)}%`;
    marker.bindTooltip(`第${i+1}名 ${v}（${metricLabel}）`,{direction:'top',offset:[0,-5],className:'village-label'});
    marker.on('click',()=>{goToVillage(v);});
    top5Layer.addLayer(marker);
  });
  top5Layer.addTo(map);
}

// ── 地點資料：填入地址或座標 ──────────────────────────
// 格式：{ name:'名稱', lat:緯度, lng:經度, note:'備註' }
// 若你有地址而非座標，可用 Google Maps 查詢座標後填入
// 例：搜尋「高雄市三民區○○路○○號」→ 右鍵 → 複製座標
const LOCATIONS = [
  // { name:'○○社區活動中心', lat:22.6580, lng:120.3100, note:'約500戶' },
  // { name:'○○里辦公處',     lat:22.6620, lng:120.3050, note:'' },
];
// ─────────────────────────────────────────────────────

function initLocationLayer(){
  if(locationLayer){map.removeLayer(locationLayer);locationLayer=null;}
  const btn=document.getElementById('locToggle');
  if(!LOCATIONS.length){if(btn)btn.style.display='none';return;}
  locationLayer=L.layerGroup();
  LOCATIONS.forEach(b=>{
    const marker=L.circleMarker([b.lat,b.lng],{
      radius:8,fillColor:'#ffe500',color:'#fff',weight:2,fillOpacity:0.9
    });
    const note=b.note?`<br><span style="color:#555">${b.note}</span>`:'';
    marker.bindPopup(`<div style="font-family:'Noto Sans TC',sans-serif;font-size:13px"><b style="color:#4f7cff">${b.name}</b>${note}</div>`,{maxWidth:220});
    locationLayer.addLayer(marker);
  });
  if(locationsVisible)locationLayer.addTo(map);
  if(btn){btn.style.display='block';btn.classList.toggle('on',locationsVisible);}
}

function toggleLocations(){
  locationsVisible=!locationsVisible;
  if(locationLayer){
    if(locationsVisible)locationLayer.addTo(map);
    else map.removeLayer(locationLayer);
  }
  const btn=document.getElementById('locToggle');
  if(btn)btn.classList.toggle('on',locationsVisible);
}
