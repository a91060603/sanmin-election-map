<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
  <title>三民區選舉地圖</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --panel: #1a1d27;
      --border: #2e3247;
      --accent: #4f7cff;
      --accent2: #ff6b6b;
      --text: #e8eaf0;
      --muted: #7b82a0;
      --vote-1: #edf8fb;
      --vote-2: #b2e2ef;
      --vote-3: #66bdd8;
      --vote-4: #2196b8;
      --vote-5: #0b6988;
      --rate-1: #fff7ec;
      --rate-2: #fee8c8;
      --rate-3: #fdbb84;
      --rate-4: #e34a33;
      --rate-5: #990000;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    header .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .controls-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-right: 4px;
    }
    .btn {
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 500;
    }

    /* ── Map + sidebar layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #map {
      flex: 1;
      background: #151820;
    }

    /* ── Info sidebar ── */
    .sidebar {
      width: 240px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-title {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    /* info card */
    .info-placeholder {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .info-village {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 2px;
    }
    .info-area {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { font-size: 12px; color: var(--muted); }
    .stat-value { font-size: 15px; font-weight: 600; color: var(--text); }
    .stat-value.highlight { color: var(--accent); }

    /* legend */
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      font-size: 12px;
      color: var(--muted);
    }
    .legend-swatch {
      width: 18px; height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Leaflet overrides */
    .leaflet-container { background: #151820; }
    .leaflet-control-zoom a {
      background: var(--panel) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-attribution {
      background: rgba(26,29,39,0.8) !important;
      color: var(--muted) !important;
    }
    .leaflet-control-attribution a { color: var(--accent) !important; }
  </style>
</head>
<body>

<header>
  <div class="dot"></div>
  <div>
    <h1>高雄市三民區選舉地圖</h1>
    <div class="subtitle">點擊里界查看詳細資料</div>
  </div>
</header>

<div class="controls">
  <span class="controls-label">顯示資料</span>
  <button class="btn active" onclick="switchLayer('vote2022')">2022 得票數</button>
  <button class="btn" onclick="switchLayer('trate2022')">2022 催票率</button>
  <!-- 之後新增年度只要在這裡加一行 -->
</div>

<div class="main">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">里別資訊</div>
      <div id="info-content">
        <div class="info-placeholder">← 點擊地圖上的里界，<br>查看該里的選舉資料。</div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">圖例</div>
      <div id="legend-content"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-title">統計</div>
      <div id="stats-content" class="info-placeholder">載入中...</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── 地圖初始化 ──
const map = L.map('map', {
  zoomControl: true,
  attributionControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ── 顏色設定 ──
const colorScales = {
  vote2022: {
    label: '2022 得票數',
    unit: '票',
    format: v => v + ' 票',
    breaks: [100, 250, 450, 650, 900],
    colors: ['#edf8fb','#b2e2ef','#66bdd8','#2196b8','#0b6988','#074d66'],
    labels: ['< 100', '100–250', '250–450', '450–650', '650–900', '> 900']
  },
  trate2022: {
    label: '2022 催票率',
    unit: '%',
    format: v => (v * 100).toFixed(1) + '%',
    breaks: [0.045, 0.055, 0.065, 0.075, 0.085],
    colors: ['#fff7ec','#fee8c8','#fdbb84','#e34a33','#b30000','#7f0000'],
    labels: ['< 4.5%', '4.5–5.5%', '5.5–6.5%', '6.5–7.5%', '7.5–8.5%', '> 8.5%']
  }
};

let currentField = 'vote2022';
let geojsonLayer = null;
let geojsonData = null;

function getColor(field, value) {
  const scale = colorScales[field];
  if (value === null || value === undefined) return '#333';
  for (let i = 0; i < scale.breaks.length; i++) {
    if (value < scale.breaks[i]) return scale.colors[i];
  }
  return scale.colors[scale.colors.length - 1];
}

function styleFeature(feature) {
  const val = feature.properties[currentField];
  return {
    fillColor: getColor(currentField, val),
    weight: 1,
    opacity: 0.6,
    color: '#1a1d27',
    fillOpacity: 0.85
  };
}

function highlightFeature(e) {
  const layer = e.target;
  layer.setStyle({ weight: 2.5, color: '#ffffff', fillOpacity: 0.95 });
  layer.bringToFront();
  showInfo(layer.feature.properties);
}

function resetHighlight(e) {
  geojsonLayer.resetStyle(e.target);
}

function onEachFeature(feature, layer) {
  layer.on({ mouseover: highlightFeature, mouseout: resetHighlight, click: highlightFeature });
}

// ── 顯示側邊欄資訊 ──
function showInfo(props) {
  const scale = colorScales[currentField];
  const val = props[currentField];
  document.getElementById('info-content').innerHTML = `
    <div class="info-village">${props.village || '-'}</div>
    <div class="info-area">${props.area || ''} · ${props.district || ''}</div>
    <div class="stat-row">
      <span class="stat-label">人口數</span>
      <span class="stat-value">${props.pop2022 ? props.pop2022.toLocaleString() : '-'}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">2022 得票數</span>
      <span class="stat-value highlight">${props.vote2022 ?? '-'} 票</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">2022 催票率</span>
      <span class="stat-value">${props.trate2022 ? (props.trate2022*100).toFixed(2) + '%' : '-'}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">催票率排名</span>
      <span class="stat-value">${props.trate2022_ ?? '-'}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">得票排名</span>
      <span class="stat-value">${props.vote2022_r ?? '-'}</span>
    </div>
  `;
}

// ── 圖例 ──
function updateLegend(field) {
  const scale = colorScales[field];
  let html = '';
  scale.labels.forEach((label, i) => {
    html += `<div class="legend-item">
      <div class="legend-swatch" style="background:${scale.colors[i]}"></div>
      <span>${label}</span>
    </div>`;
  });
  document.getElementById('legend-content').innerHTML = html;
}

// ── 切換圖層 ──
function switchLayer(field) {
  currentField = field;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (geojsonLayer) geojsonLayer.setStyle(styleFeature);
  updateLegend(field);
  document.getElementById('info-content').innerHTML =
    '<div class="info-placeholder">← 點擊地圖上的里界，<br>查看該里的選舉資料。</div>';
}

// ── 統計資訊 ──
function updateStats(data) {
  const votes = data.features.map(f => f.properties.vote2022).filter(Boolean);
  const total = votes.reduce((a, b) => a + b, 0);
  const max = Math.max(...votes);
  const maxVillage = data.features.find(f => f.properties.vote2022 === max)?.properties.village;
  document.getElementById('stats-content').innerHTML = `
    <div class="stat-row">
      <span class="stat-label">里數</span>
      <span class="stat-value">${data.features.length}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">總得票</span>
      <span class="stat-value">${total.toLocaleString()}</span>
    </div>
    <div class="stat-row">
      <span class="stat-label">最高票里</span>
      <span class="stat-value highlight">${maxVillage || '-'}</span>
    </div>
  `;
}

// ── 載入 GeoJSON ──
fetch('sanmin_vote.geojson')
  .then(r => r.json())
  .then(data => {
    geojsonData = data;
    geojsonLayer = L.geoJSON(data, {
      style: styleFeature,
      onEachFeature: onEachFeature
    }).addTo(map);
    map.fitBounds(geojsonLayer.getBounds(), { padding: [20, 20] });
    updateLegend(currentField);
    updateStats(data);
  })
  .catch(err => {
    console.error('GeoJSON 載入失敗:', err);
    document.getElementById('info-content').innerHTML =
      '<div class="info-placeholder" style="color:#ff6b6b">GeoJSON 載入失敗，請確認 sanmin_vote.geojson 在同一資料夾。</div>';
  });
</script>
</body>
</html>
